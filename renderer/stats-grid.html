<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Estatísticas</title>
<link rel="stylesheet" href="./fonts/fonts.css"><!-- fontes locais: sem rede, sem flash -->
<style>
  /* TELA CHEIA: um card por conta nos cantos, cada um com a sua cor e uma perna
     apontando pro centro, e a Pokébola central com o total somado. */
  :root{
    --bg:#080a0f; --card:#0d1017; --card2:#0a0d13;
    --cream:#f2f4f8; --muted:#9aa3b2; --faint:#6b7382;
    --azul:#3b9dff; --verde:#37d67a; --roxo:#a855f7; --laranja:#f5a524;
    --bad:#ff6b55; --esc:1;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--cream);
    font-family:Inter,system-ui,sans-serif;
    background:radial-gradient(120% 100% at 50% 50%,#101725 0%,var(--bg) 70%)}

  .tela{position:relative;height:100%;display:grid;
    grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:11vmin 12vmin;padding:2.4vmin}
  .q{position:relative;min-width:0;min-height:0}
  /* o canto virado pro centro ganha folga: a Pokebola encosta ali e nao pode tapar numero */
  .q1 .card{padding-right:5.5vmin;padding-bottom:3.4vmin}
  .q2 .card{padding-left:5.5vmin;padding-bottom:3.4vmin}
  .q3 .card{padding-right:5.5vmin;padding-top:3.4vmin}
  .q4 .card{padding-left:5.5vmin;padding-top:3.4vmin}

  .card{position:relative;height:100%;display:flex;flex-direction:column;
    border:1.5px solid var(--c);border-radius:2.2vmin;padding:2.2vmin 2.6vmin;
    background:linear-gradient(160deg,var(--card),var(--card2));
    box-shadow:0 0 3.4vmin color-mix(in srgb,var(--c) 26%,transparent),
      inset 0 0 3vmin color-mix(in srgb,var(--c) 6%,transparent)}
  /* cabeçalho: ícone redondo + título grande na cor + subtítulo */
  .ch{display:flex;align-items:center;gap:1.6vmin;padding-bottom:1.6vmin;
    border-bottom:1px solid rgba(255,255,255,.07)}
  .cico{width:5.4vmin;height:5.4vmin;flex:none;border-radius:50%;display:grid;place-items:center;
    border:2px solid var(--c);background:color-mix(in srgb,var(--c) 12%,transparent);
    box-shadow:0 0 1.8vmin color-mix(in srgb,var(--c) 35%,transparent)}
  .cico img{width:3.4vmin;height:3.4vmin;object-fit:contain;image-rendering:pixelated}
  .cico span{font-size:2.6vmin;line-height:1;color:var(--c);font-weight:800}
  .cht{min-width:0;flex:1}
  .ct{font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:3.1vmin;color:var(--c);
    letter-spacing:.04em;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    text-shadow:0 0 1.6vmin color-mix(in srgb,var(--c) 45%,transparent)}
  .cs{font-size:1.5vmin;color:var(--muted);margin-top:.4vmin;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cb{flex:none;font-size:1.35vmin;font-weight:800;padding:.5em 1.1em;border-radius:99px;
    text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
  .b-ok{color:#06210f;background:var(--verde)} .b-warn{color:#231703;background:var(--laranja)} .b-down{color:#fff;background:#e2483a}

  /* linhas: ícone + rótulo + valor na cor */
  .rows{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}
  .r{display:flex;align-items:center;gap:1.5vmin;padding:.85vmin 0}
  .r+.r{border-top:1px solid rgba(255,255,255,.05)}
  .ri{width:3.2vmin;height:3.2vmin;flex:none;display:grid;place-items:center}
  .ri img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
  .ri span{font-size:2.2vmin;line-height:1;color:var(--c)}
  .rl{flex:1;min-width:0;font-size:1.85vmin;color:var(--cream);font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rv{font-family:'Cinzel',serif;font-weight:800;font-size:2.5vmin;color:var(--c);
    font-variant-numeric:tabular-nums;white-space:nowrap}
  .r.zero .rv{color:var(--bad)}

  /* barra do rodapé do card */
  .bar{margin-top:1.6vmin}
  .track{height:1.1vmin;border-radius:1vmin;background:rgba(255,255,255,.07);overflow:hidden}
  .fill{height:100%;border-radius:1vmin;background:var(--c);
    box-shadow:0 0 1.4vmin color-mix(in srgb,var(--c) 60%,transparent);transition:width .5s ease}
  .cap{margin-top:.8vmin;font-size:1.4vmin;color:var(--faint)}

  /* perna: sai do canto interno do card e aponta pro centro */
  .leg{position:absolute;width:5.2vmin;height:5.2vmin;pointer-events:none;border-color:var(--c);opacity:.85}
  .q1 .leg{right:-5.2vmin;bottom:-5.2vmin;border-right:1.5px solid;border-bottom:1.5px solid;
    border-bottom-right-radius:1.2vmin}
  .q2 .leg{left:-5.2vmin;bottom:-5.2vmin;border-left:1.5px solid;border-bottom:1.5px solid;
    border-bottom-left-radius:1.2vmin}
  .q3 .leg{right:-5.2vmin;top:-5.2vmin;border-right:1.5px solid;border-top:1.5px solid;
    border-top-right-radius:1.2vmin}
  .q4 .leg{left:-5.2vmin;top:-5.2vmin;border-left:1.5px solid;border-top:1.5px solid;
    border-top-left-radius:1.2vmin}

  /* ---- Pokébola central ---- */
  .bola{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;
    width:25vmin;height:25vmin;border-radius:50%;border:.8vmin solid #14171d;
    background:linear-gradient(180deg,#e0362b 0 calc(50% - .45vmin),#14171d calc(50% - .45vmin) calc(50% + .45vmin),#f4f6f8 calc(50% + .45vmin) 100%);
    box-shadow:0 0 8vmin rgba(224,54,43,.34),0 2vmin 5vmin rgba(0,0,0,.75),
      inset 0 -2vmin 4vmin rgba(0,0,0,.28),inset 0 2vmin 3vmin rgba(255,255,255,.14)}
  .miolo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:60%;height:60%;border-radius:50%;background:#f4f6f8;border:.8vmin solid #14171d;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2vmin;
    box-shadow:inset 0 .4vmin 1.2vmin rgba(0,0,0,.2)}
  .mk{font-size:1.05vmin;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#5b6472}
  .mv{font-family:'Cinzel',serif;font-weight:800;font-size:2.6vmin;line-height:1;color:#14171d}
  .mv.neg{color:#c0392b}
  .ms{font-size:1.02vmin;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7a8391}
  .vazio{position:absolute;inset:0;display:grid;place-items:center;color:var(--faint);font-style:italic}
  .stamp{position:absolute;right:1.2vmin;bottom:1vmin;font-size:1.2vmin;color:var(--faint);z-index:6}
</style>
</head>
<body>
  <div class="tela" id="tela"></div>
  <div id="centro"></div>
  <span class="stamp" id="stamp"></span>
<script>
  const $ = (s)=>document.querySelector(s)
  const fmt = (n)=>Number(n||0).toLocaleString('pt-BR')
  const money = (n)=>(n<0?'-$':'$')+Math.abs(Number(n||0)).toLocaleString('pt-BR')
  const curto = (n)=>{ n=Number(n||0); const s=n<0?'-':'+'; n=Math.abs(n)
    if(n>=1e9) return s+'$'+(n/1e9).toFixed(1).replace('.',',')+'B'
    if(n>=1e6) return s+'$'+(n/1e6).toFixed(1).replace('.',',')+'M'
    if(n>=1e3) return s+'$'+(n/1e3).toFixed(1).replace('.',',')+'k'
    return s+'$'+n }
  const esc = (s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
  const GAME = 'https://poke.idleworld.online'
  const DEX = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'
  const url = (s)=> !s ? null : (/^(https?:|data:)/.test(s) ? s : (s.charAt(0)==='/' ? GAME+s : GAME+'/assets/items/'+s))
  const ehImg = (s)=> !!s && (/^(https?:|data:)/.test(s) || s.indexOf('/')>=0)
  const ico = (s)=> ehImg(s) ? '<img src="'+esc(url(s))+'" alt="">' : '<span>'+(s||'')+'</span>'
  const POKE = GAME+'/assets/markitems/pokeball.png'
  const BACK = { potion: GAME+'/assets/markitems/ultra_potion.png', revive: GAME+'/assets/markitems/revive.png' }
  const namesMap = ()=>{ try{ return JSON.parse(localStorage.getItem('pml_names')||'{}') }catch{ return {} } }
  const nameOf = (n)=>namesMap()[n]||('Conta '+n)
  const lowBall = ()=>parseInt(localStorage.getItem('pml_lowball')||'500')||500
  const LEND = 1.7   // "Lendário" = qualidade >= 1,7 (tier Lendária do jogo)
  const lendarios = (st)=>{ const c=st&&st.live&&st.live.catches; return Array.isArray(c)?c.filter(x=>(x.quality||0)>=LEND).length:0 }
  const spriteDe = (lista,cat)=>{ if(!Array.isArray(lista))return null
    const c=lista.filter(x=>x.tipo===cat&&x.icon).sort((a,b)=>b.qty-a.qty)[0]; return c?c.icon:null }
  const CORES = ['var(--azul)','var(--verde)','var(--roxo)','var(--laranja)']

  function alertOf (st){
    if(!st||st.ok===false) return { badge:'b-down', txt:'Off' }
    if(st.live&&st.live.offline) return { badge:'b-down', txt:'Caiu' }
    if(st.balls&&Object.keys(st.balls).length){
      if(st.ballsTotal===0) return { badge:'b-down', txt:'Sem bolas' }
      if(st.ballsTotal<lowBall()) return { badge:'b-warn', txt:'Bolas' }
    }
    if(!st.hunt||!st.hunt.seen) return { badge:'b-warn', txt:'Fora' }
    return { badge:'b-ok', txt:'Hunt' }
  }
  const linha = (src,lbl,val,cls)=>'<div class="r '+(cls||'')+'"><span class="ri">'+ico(src)+'</span>'+
    '<span class="rl">'+lbl+'</span><span class="rv">'+val+'</span></div>'

  function cardConta (r, i){
    const st=r.state, a=alertOf(st), cor=CORES[i%4]
    if(!st||st.ok===false){
      return '<div class="card" style="--c:'+cor+'"><div class="ch"><span class="cico"><span>?</span></span>'+
        '<span class="cht"><div class="ct">'+esc(nameOf(r.num))+'</div><div class="cs">sem resposta</div></span>'+
        '<span class="cb '+a.badge+'">'+a.txt+'</span></div>'+
        '<div class="rows"><div class="vazio">jogo não respondeu</div></div></div><span class="leg"></span>'
    }
    const lid=st.lider, dex=lid&&lid.speciesId
    const bola=(st.ballList&&st.ballList.length&&st.ballList[0].icon)||POKE
    const pot=spriteDe(st.cura,'heal')||BACK.potion, rev=spriteDe(st.cura,'revive')||BACK.revive
    const saldo=st.fin&&st.fin.saldo
    // barra = HP do time (o WS dá o do líder)
    const hp=(lid&&lid.hp!=null)?lid.hp:st.hp, hpMax=(lid&&lid.maxHp)||st.hpMax
    const pct=(hp!=null&&hpMax)?Math.max(0,Math.min(100,hp/hpMax*100)):null
    const sub=[]; if(lid&&lid.name)sub.push((lid.shiny?'★ ':'')+lid.name+(lid.level?' nv '+lid.level:''))
    if(st.zone)sub.push(st.zone)
    return '<div class="card" style="--c:'+cor+'">'+
      '<div class="ch"><span class="cico">'+(dex?'<img src="'+DEX+dex+'.png" alt="">':'<span>◉</span>')+'</span>'+
        '<span class="cht"><div class="ct">'+esc(nameOf(r.num))+'</div>'+
        '<div class="cs">'+(sub.length?esc(sub.join(' · ')):'aguardando dados')+'</div></span>'+
        '<span class="cb '+a.badge+'">'+a.txt+'</span></div>'+
      '<div class="rows">'+
        linha(bola,'Pokébola',fmt(st.ballsTotal||0), st.ballsTotal===0?'zero':'')+
        linha(pot,'Potion',st.potions!=null?fmt(st.potions):'—', st.potions===0?'zero':'')+
        linha(rev,'Revive',st.revives!=null?fmt(st.revives):'—', st.revives===0?'zero':'')+
        linha('★','Lendários',fmt(lendarios(st)))+
        linha('$','Profit',saldo!=null?curto(saldo):'—')+
      '</div>'+
      (pct!=null?'<div class="bar"><div class="track"><div class="fill" style="width:'+pct.toFixed(0)+'%"></div></div>'+
        '<div class="cap">HP do time · '+fmt(hp)+' / '+fmt(hpMax)+'</div></div>':'')+
      '</div><span class="leg"></span>'
  }

  function bolaCentral (rows){
    let profit=0, temProfit=false
    rows.forEach(r=>{ const st=r.state
      if(st&&st.fin&&st.fin.saldo!=null){ profit+=st.fin.saldo; temProfit=true } })
    const vivas=rows.filter(r=>alertOf(r.state).badge==='b-ok').length
    return '<div class="bola"><div class="miolo">'+
      '<span class="mk">Total geral</span>'+
      '<span class="mv'+(temProfit&&profit<0?' neg':'')+'">'+(temProfit?curto(profit):'—')+'</span>'+
      '<span class="ms">'+vivas+'/'+rows.length+' na hunt</span></div></div>'
  }

  async function refresh (){
    try{
      const r=await window.ml.readDashboard()
      const tela=$('#tela')
      if(!r||!r.results||!r.results.length){
        tela.innerHTML='<div class="vazio">Nenhuma conta aberta.</div>'; $('#centro').innerHTML=''; return }
      const rows=r.results.slice(0,4)
      // sempre 4 posições (q1..q4): cada conta num canto, apontando pro centro
      tela.innerHTML = [0,1,2,3].map(i=>{
        const row=rows[i]
        return '<div class="q q'+(i+1)+'">'+(row?cardConta(row,i):'')+'</div>'
      }).join('')
      $('#centro').innerHTML = bolaCentral(rows)
      const d=new Date(); $('#stamp').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')
    }catch(e){ $('#tela').innerHTML='<div class="vazio">Erro: '+esc(e.message)+'</div>' }
  }
  window.__refresh=refresh
  // só varre as contas com o modo Estatísticas LIGADO (main-lite seta window.__vpActive)
  setInterval(()=>{ if(window.__vpActive) refresh() },2500)
  if(window.__vpActive) refresh()
</script>
</body>
</html>
