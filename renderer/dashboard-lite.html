<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Dashboard das contas</title>
<link rel="stylesheet" href="./fonts/fonts.css"><!-- fontes locais: sem rede, sem flash -->
<style>
  /* Design system VP (o mesmo do vperts.com.br / vpertz-lab): rubi + dourado + carvao,
     Cinzel no display, Inter na interface, textura de fundo do site. Layout: navegacao de
     contas a esquerda e UM painel por conta a direita (Modelo 1). */
  :root{
    --bg:#0a0605; --surface:#150d0b; --surface-2:#1e1210; --surface-3:#261712;
    --line:rgba(216,138,74,.18); --line-strong:rgba(229,179,79,.4);
    --red:#c33629; --red-2:#e24b35; --red-deep:#8e1d19;
    --gold:#e5b34f; --gold-soft:#d98350; --cream:#f7eee7;
    --muted:#b5a196; --faint:#7d6d64;
    --good:#4fc47a; --mid:#e0a93c; --bad:#ff6b55; --xp:#9146ff; --ball:#5b9be6;
    --ease:cubic-bezier(.22,.7,.2,1);
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--cream);
    font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg)}
  /* fundo com vida: textura do site + brilho rubi no topo (igual body::before do vplab) */
  body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:url('assets/bg-vp.webp') center top/cover no-repeat;opacity:.5}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(1100px 520px at 50% -10%,rgba(194,54,41,.16),transparent 60%),
      linear-gradient(180deg,rgba(10,6,5,.72),rgba(10,6,5,.93))}

  /* ---------- barra de titulo ---------- */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:9px 8px 9px 13px;
    background:linear-gradient(90deg,rgba(23,8,7,.96),rgba(42,15,11,.96) 50%,rgba(23,8,7,.96));
    border-bottom:1px solid rgba(226,75,53,.24);-webkit-app-region:drag}
  .bar .t{display:flex;align-items:center;gap:10px;min-width:0}
  .bar .logo{width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  .bar .tt{font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:15px;color:var(--gold);
    letter-spacing:.06em;line-height:1.1}
  .bar .tt small{display:block;font-family:Inter,sans-serif;font-weight:600;font-size:8.5px;
    color:var(--faint);text-transform:uppercase;letter-spacing:.16em;margin-top:2px}
  .live-dot{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;
    color:var(--good);background:rgba(79,196,122,.1);border:1px solid rgba(79,196,122,.32);
    border-radius:99px;padding:4px 10px;-webkit-app-region:no-drag;white-space:nowrap}
  .live-dot i{width:7px;height:7px;border-radius:50%;background:var(--good)}
  .live-dot.off{color:var(--bad);background:rgba(255,107,85,.1);border-color:rgba(255,107,85,.35)}
  .live-dot.off i{background:var(--bad)}
  .wbtns{display:flex;gap:2px;-webkit-app-region:no-drag}
  .bar button{-webkit-app-region:no-drag;background:transparent;border:0;color:var(--faint);
    font-size:13px;cursor:pointer;border-radius:8px;width:27px;height:27px;line-height:1;transition:.15s var(--ease)}
  .bar button:hover{color:var(--cream);background:rgba(255,255,255,.08)}
  #pin.on{color:var(--gold);background:rgba(229,179,79,.16)}
  #x:hover{color:#fff;background:var(--red-2)}

  /* ---------- corpo: nav + painel ---------- */
  .det{display:flex;height:calc(100% - 45px - 44px);min-height:0}
  .nav{width:166px;flex:none;border-right:1px solid var(--line);background:rgba(13,8,7,.72);
    padding:12px 9px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
  .nav::-webkit-scrollbar{width:6px}.nav::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
  .navh{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold-soft);padding:4px 8px 7px}
  .navb{display:flex;align-items:center;gap:9px;width:100%;background:transparent;
    border:1px solid transparent;color:var(--muted);padding:9px 10px;border-radius:11px;
    cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;text-align:left;
    transition:.16s var(--ease);min-width:0}
  .navb:hover{color:var(--cream);background:rgba(255,255,255,.05)}
  .navb.on{color:var(--gold);border-color:var(--line-strong);
    background:linear-gradient(90deg,rgba(229,179,79,.14),rgba(229,179,79,.02))}
  .navb i{width:7px;height:7px;border-radius:50%;flex:none;background:var(--good)}
  .navb i.warn{background:var(--mid)} .navb i.down{background:var(--bad)}
  .navb span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .navb img{width:22px;height:22px;flex:none;object-fit:contain;image-rendering:pixelated;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
  .navsep{height:1px;background:var(--line);margin:8px 6px}

  .pane{flex:1;min-width:0;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:11px}
  .pane::-webkit-scrollbar{width:7px}.pane::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px}

  /* ---------- cabecalho do painel (com a arte do pokemon) ---------- */
  .hero{position:relative;overflow:hidden;border:1px solid var(--line-strong);border-radius:16px;
    padding:14px 16px;min-height:92px;display:flex;align-items:center;
    background:linear-gradient(100deg,rgba(38,23,18,.96),rgba(13,8,7,.86) 62%),
      radial-gradient(120% 160% at 100% 50%,rgba(194,54,41,.22),transparent 62%)}
  .hero .art{position:absolute;right:10px;top:50%;transform:translateY(-50%);height:118%;
    opacity:.92;image-rendering:pixelated;pointer-events:none;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 42%);
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.6))}
  .hero .glow{position:absolute;right:26px;top:50%;width:132px;height:132px;transform:translateY(-50%);
    border-radius:50%;background:radial-gradient(circle,rgba(229,179,79,.2),transparent 68%);pointer-events:none}
  .hero .hinfo{position:relative;z-index:2;min-width:0;flex:1}
  .hero h2{font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:22px;color:var(--cream);
    margin:0;letter-spacing:.04em;line-height:1.15;text-shadow:0 2px 12px rgba(0,0,0,.7)}
  .hero p{margin:5px 0 0;font-size:11.5px;color:var(--muted)}
  .hero .hb{position:relative;z-index:2;flex:none;font-size:10px;font-weight:800;padding:5px 11px;
    border-radius:99px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
  .b-ok{color:#0c1a10;background:var(--good)} .b-warn{color:#1a1405;background:var(--mid)} .b-down{color:#fff;background:var(--red-2)}
  /* lixeira do dashboard: discreta, ao lado do badge; acende no hover (destrutiva, nao chama atencao a toa) */
  .hero .zerar{position:relative;z-index:2;flex:none;margin-left:8px;width:30px;height:30px;
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:9px;color:var(--faint);
    font-size:14px;cursor:pointer;transition:color .16s var(--ease),border-color .16s var(--ease),background .16s var(--ease)}
  .hero .zerar:hover{color:#fff;border-color:var(--red-2);background:rgba(194,54,41,.18)}
  .hero .zerar:disabled{opacity:.4;cursor:default}

  /* ---------- cards (Modelo 1) ---------- */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(146px,1fr));gap:9px}
  .tile{position:relative;overflow:hidden;background:linear-gradient(160deg,rgba(30,18,16,.9),rgba(11,7,6,.92));
    border:1px solid var(--line);border-radius:14px;padding:12px 13px;min-width:0;
    display:flex;flex-direction:column;transition:border-color .18s var(--ease),transform .18s var(--ease)}
  .tile::before{content:"";position:absolute;inset:0 0 auto;height:1px;
    background:linear-gradient(90deg,transparent,rgba(229,179,79,.35),transparent)}
  .tile:hover{border-color:var(--line-strong);transform:translateY(-1px)}
  .tile .th{display:flex;align-items:center;gap:9px;margin-bottom:10px;min-height:34px}
  .tile .ic{width:33px;height:33px;flex:none;border-radius:10px;display:grid;place-items:center;
    font-size:14px;font-weight:800;line-height:1;border:1px solid currentColor;
    background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.09),transparent 70%)}
  .tile .ic img{width:22px;height:22px;object-fit:contain;image-rendering:pixelated}
  .tile .ic svg{width:16px;height:16px;fill:currentColor}
  .tile .tk{font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;
    color:var(--muted);line-height:1.25;min-width:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tile .tv{font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:20px;line-height:1;
    color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile .ts{font-size:9.5px;color:var(--faint);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t-gold .ic{color:var(--gold)}  .t-gold .tv{color:var(--gold)}
  .t-good .ic{color:var(--good)}  .t-good .tv{color:var(--good)}
  .t-xp .ic{color:var(--xp)}  .t-ball .ic{color:var(--ball)}  .t-mut .ic{color:var(--faint)}
  .tile.zero .tv{color:var(--bad)}

  /* ---------- secoes ---------- */
  .box{border:1px solid var(--line);border-radius:15px;padding:12px 14px 13px;
    background:linear-gradient(160deg,rgba(30,18,16,.62),rgba(11,7,6,.7))}
  .bh{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px}
  .bt{font-size:9.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--gold-soft)}
  .bv{font-size:10.5px;color:var(--muted);font-weight:700}
  .bv.est{color:var(--faint);font-weight:600;font-style:italic}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(104px,1fr));gap:9px}
  .st{background:rgba(11,7,6,.7);border:1px solid var(--line);border-radius:12px;padding:10px 11px;min-width:0}
  .st .sv{font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:19px;line-height:1.1;color:var(--cream);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .st .sl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .st .sd{font-size:9.5px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stg{color:var(--gold)} .stc{color:#8d8d9c}
  .linhas{display:flex;flex-direction:column;gap:5px}
  .lin{display:flex;align-items:baseline;justify-content:space-between;gap:10px;font-size:12.5px}
  .ll{color:var(--muted);font-weight:600} .ll em{font-style:normal;color:var(--faint);font-size:10.5px}
  .lv{font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .lin.pos .lv{color:var(--good)} .lin.neg .lv{color:var(--bad)}
  .tot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:10px 12px;
    border-radius:12px;background:linear-gradient(90deg,rgba(79,196,122,.12),rgba(79,196,122,.03));
    border:1px solid rgba(79,196,122,.3)}
  .tot span{font-size:10.5px;color:var(--muted);font-weight:700}
  .tot b{font-family:'Cinzel',serif;font-size:19px;font-weight:800;white-space:nowrap}
  .tot b.pos{color:var(--good)} .tot b.neg{color:var(--bad)}
  .ph2{display:flex;align-items:center;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--faint)}
  .ph2 b{color:var(--gold);font-weight:800;font-variant-numeric:tabular-nums}
  .prog{background:rgba(11,7,6,.7);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .prog .ph{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
  .prog .pt{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft)}
  .prog .pv{font-size:11px;color:var(--muted);font-weight:700}
  .track{height:10px;border-radius:6px;background:#170d0b;border:1px solid var(--line);overflow:hidden}
  .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#3ae07c,#1fb959);transition:width .4s var(--ease)}
  .fill.mid{background:linear-gradient(90deg,var(--mid),var(--gold-soft))}
  .fill.low{background:linear-gradient(90deg,var(--red-2),var(--red))}
  .sec{border-top:1px dashed var(--line);padding-top:11px}
  .sech{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft);
    margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .sech em{font-style:normal;color:var(--faint);letter-spacing:.02em;text-transform:none;font-weight:600;font-size:10px}
  .items{display:flex;gap:7px;flex-wrap:wrap}
  .item{display:flex;align-items:center;gap:7px;background:rgba(13,8,7,.8);border:1px solid var(--line);
    border-radius:11px;padding:7px 11px;font-size:13.5px;font-weight:800;color:var(--cream)}
  .item.zero{border-color:rgba(226,75,53,.5);color:#ff9d8d}
  .item.uso{border-color:var(--line-strong);background:rgba(229,179,79,.1)}
  /* a arte da idleball preenche o PNG inteiro; as outras bolas vem com margem transparente
     dentro do sprite — no mesmo box de 20px elas apareciam bem menores. Box maior pra todas
     e a idle um pouco menor deixa o tamanho APARENTE igual. */
  .item img{width:24px;height:24px;object-fit:contain;image-rendering:pixelated;flex:none}
  .item img.idle{width:20px;height:20px}
  .item .sp{width:20px;height:20px;flex:none;background-repeat:no-repeat;background-position:center}
  .item small{font-size:9.5px;color:var(--faint);font-weight:600}
  .drops{display:flex;flex-direction:column;gap:2px;max-height:190px;overflow-y:auto}
  .drops::-webkit-scrollbar{width:6px}.drops::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
  .drop{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:4px 0;border-bottom:1px solid rgba(216,138,74,.07)}
  .drop:last-child{border-bottom:0}
  .drop .dn{flex:1;min-width:0;display:flex;align-items:center;gap:8px;color:var(--cream);font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drop img{width:20px;height:20px;object-fit:contain;image-rendering:pixelated;flex:none}
  .drop .ph{width:20px;height:20px;flex:none;border-radius:5px;background:#170d0b;border:1px solid var(--line)}
  .drop .dq{color:var(--faint);font-size:10.5px;font-weight:700;white-space:nowrap}
  .drop .dg{color:var(--good);font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:66px;text-align:right}
  .last{font-size:12.5px;font-weight:700;color:var(--cream);background:rgba(145,70,255,.1);
    border:1px solid rgba(145,70,255,.32);border-radius:12px;padding:9px 12px}
  .rare{font-size:11px;font-weight:700;color:#ffe0a0;background:rgba(229,179,79,.1);
    border:1px solid rgba(229,179,79,.4);border-radius:11px;padding:7px 11px}
  .caps{display:flex;flex-direction:column;gap:3px;border-top:1px dashed var(--line);padding-top:9px;
    max-height:170px;overflow-y:auto}
  .caps::-webkit-scrollbar{width:6px}.caps::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
  .cap{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;padding:1px 0}
  .cap .cn{color:var(--cream);font-weight:700} .cap .civ{color:var(--faint);font-size:10.5px}
  .cap .cq{font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums}
  .cap.sh .cn::before{content:'★ ';color:var(--gold)}
  .na{color:var(--faint);font-style:italic;font-size:12px;text-align:center;padding:20px}
  .capsel{display:flex;align-items:center;gap:8px}
  .capsel select{background:rgba(11,7,6,.9);border:1px solid var(--line);border-radius:9px;color:var(--cream);
    padding:4px 8px;font-family:inherit;font-size:11px;font-weight:600;outline:none;cursor:pointer}
  .capsel select:focus{border-color:var(--gold)}

  .ft{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 13px;
    border-top:1px solid var(--line);height:44px;background:rgba(13,8,7,.8)}
  .ft label{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px}
  .ft input[type=number]{width:58px;background:rgba(11,7,6,.9);border:1px solid var(--line);border-radius:7px;
    color:var(--cream);padding:3px 6px;font-family:inherit;font-size:11px}
  .ft .stamp{font-size:10px;color:var(--faint)}
  .rgrip{position:fixed;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;-webkit-app-region:no-drag;opacity:.55}
  .rgrip:hover{opacity:1}
  .rgrip::after{content:"";position:absolute;right:3px;bottom:3px;width:12px;height:12px;
    background:linear-gradient(135deg,transparent 45%,var(--gold-soft) 45% 55%,transparent 55%),
      linear-gradient(135deg,transparent 65%,var(--gold-soft) 65% 75%,transparent 75%),
      linear-gradient(135deg,transparent 85%,var(--gold-soft) 85% 95%,transparent 95%)}
</style>
</head>
<body>
  <div class="bar">
    <span class="t"><img src="logo-vp.png" class="logo" alt="VP"><span class="tt">DASHBOARD<small>das contas</small></span></span>
    <span class="live-dot" id="status"><i></i><span id="statustxt">—</span></span>
    <div class="wbtns">
      <button id="pin" title="Fixar no topo">📌</button>
      <button id="x" title="Fechar">✕</button>
    </div>
  </div>
  <div class="det">
    <nav class="nav" id="nav"></nav>
    <div class="pane" id="pane"><div class="na">carregando…</div></div>
  </div>
  <div class="ft">
    <label><input type="checkbox" id="auto" checked /> auto (4s)</label>
    <label>avisar &lt; <input type="number" id="lowball" value="500"> bolas</label>
    <span class="stamp" id="stamp"></span>
  </div>
  <div class="rgrip" id="rgrip" title="Arraste pra redimensionar"></div>
<script>
  const $ = (s) => document.querySelector(s)
  const fmt = (n) => Number(n || 0).toLocaleString('pt-BR')
  const money = (n) => (n < 0 ? '-$' : '$') + Math.abs(Number(n || 0)).toLocaleString('pt-BR')
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]))
  const curto = (n) => { n = Number(n||0)
    if(n>=1e9) return (n/1e9).toFixed(1).replace('.',',')+'B'
    if(n>=1e6) return (n/1e6).toFixed(1).replace('.',',')+'M'
    if(n>=1e3) return (n/1e3).toFixed(1).replace('.',',')+'k'
    return String(n) }
  const dur = (s)=>{ s=Math.max(0,Math.round(s||0)); const H=Math.floor(s/3600), M=Math.floor(s%3600/60)
    return H? H+'h '+String(M).padStart(2,'0')+'m' : M+'m' }
  const namesMap = () => { try { return JSON.parse(localStorage.getItem('pml_names') || '{}') } catch { return {} } }
  const nameOf = (n) => namesMap()[n] || ('Conta ' + n)

  // o catálogo do jogo manda ícone RELATIVO ("/assets/markitems/ultraball.png")
  const GAME = 'https://poke.idleworld.online'
  const url = (s)=> !s ? null : (/^(https?:|data:)/.test(s) ? s : (s.charAt(0)==='/' ? GAME+s : GAME+'/assets/items/'+s))
  const ehImg = (s)=> !!s && (/^(https?:|data:)/.test(s) || s.indexOf('/')>=0 || /\.(png|gif|webp|jpe?g)$/i.test(s))
  const icoHtml = (s)=> ehImg(s) ? '<img src="'+esc(url(s))+'" alt="">' : '<span>'+(s||'')+'</span>'
  // sprite do pokémon pela dex nacional (mesma fonte que o launcher do Gabriel usa)
  const DEX = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'
  const spriteAnim = (dex)=> dex ? DEX+'versions/generation-v/black-white/animated/'+dex+'.gif' : null
  const spritePng  = (dex)=> dex ? DEX+dex+'.png' : null

  const BALLBACK = { potion: GAME+'/assets/markitems/ultra_potion.png', revive: GAME+'/assets/markitems/revive.png' }
  const BALL_ICON = { poke:GAME+'/assets/markitems/pokeball.png', great:GAME+'/assets/markitems/greatball.png', super:GAME+'/assets/markitems/superball.png', ultra:GAME+'/assets/markitems/ultraball.png', idle:GAME+'/assets/markitems/idleball.png' }
  const BALL_ORDER = ['poke','great','super','ultra','idle','master']
  const BALL_LABELS = { poke:'Poké', great:'Great', super:'Super', ultra:'Ultra', idle:'Idle', master:'Master' }
  // faixas conferem com a tabela oficial do jogo (pokepedia /systems/quality)
  function qtier (q){ if(q==null)return ''; if(q<1)return 'Fraca'; if(q<1.1)return 'Comum'; if(q<1.3)return 'Incomum'; if(q<1.5)return 'Rara'; if(q<1.7)return 'Épica'; if(q<2)return 'Lendária'; if(q<3)return 'Mítica'; if(q<4)return 'Anciã'; return 'Divina' }
  const TCOL = { 'Épica':'#b07bd8','Lendária':'#e5b34f','Mítica':'#ff6bd0','Anciã':'#ff8f3d','Divina':'#5fe0e0','Rara':'#5b9be6','Incomum':'#5fd38a','Comum':'#c9c9c9','Fraca':'#8a8f97' }
  const mult = (q)=> q==null ? '' : '×'+Number(q).toFixed(3).replace('.',',')
  const LEND = 1.7   // "Lendário" = qualidade ≥ 1,7 (tier Lendária do jogo)
  // SO as capturas DESTA sessao (ts >= sessTs), igual o card. `catches` e' historico e nao
  // zera na troca de hunt — sem o filtro, "Lendários" contava a vida inteira e nao zerava na
  // lixeira. Captura antiga sem `ts` (gravada antes desta versao) fica so no historico.
  const capsSessao = (st)=>{ const c=st&&st.live&&st.live.catches; if(!Array.isArray(c))return []
    const t0=st.live.sessTs; return t0?c.filter(x=>x&&x.ts&&x.ts>=t0):c }
  const lendarios = (st)=> capsSessao(st).filter(x=>(x.quality||0)>=LEND).length
  const spriteDe = (lista,cat)=>{ if(!Array.isArray(lista))return null
    const c=lista.filter(x=>x.tipo===cat&&x.icon).sort((a,b)=>b.qty-a.qty)[0]; return c?c.icon:null }

  let LOW = parseInt(localStorage.getItem('pml_lowball') || '500') || 500
  let capFilter = localStorage.getItem('pml_capfilter') || 'all'
  let sel = localStorage.getItem('pml_sel') || 'todas'      // 'todas' ou o número da conta
  let busy = false, ultimas = []

  const passaFiltro = (c)=>{ if(capFilter==='all')return true
    if(capFilter==='shiny')return !!c.shiny
    return (c.quality||0)>=parseFloat(capFilter) }
  const capNome = ()=>{ const s=$('#capfilter'); return s&&s.selectedIndex>=0 ? s.options[s.selectedIndex].text.toLowerCase() : '' }

  function alertOf (st){
    if(!st || st.ok===false) return { cls:'down', badge:'b-down', txt:'Off' }
    if(st.live && st.live.offline) return { cls:'down', badge:'b-down', txt:'Caiu' }
    // ALERTA PELA BOLA DA HUNT (st.ballAtiva), nao pelo total. Olhar o total deixava a conta
    // verde com a Ultra Ball zerada e milhares de Poke Ball encalhadas — parava de capturar e o
    // painel dizia que estava tudo bem. Mesmo fix que o card ganhou em 23/07. Sem ballAtiva
    // (leitor antigo), cai no total.
    const ba = st.ballAtiva
    if(ba){
      if((ba.qty||0)===0) return { cls:'down', badge:'b-down', txt:'Sem '+(ba.name||'bola') }
      if((ba.qty||0)<LOW) return { cls:'warn', badge:'b-warn', txt:(ba.name||'Bolas') }
    } else if(st.balls && Object.keys(st.balls).length){
      if(st.ballsTotal===0) return { cls:'down', badge:'b-down', txt:'Sem bolas' }
      if(st.ballsTotal<LOW) return { cls:'warn', badge:'b-warn', txt:'Bolas' }
    }
    if(!st.hunt || !st.hunt.seen) return { cls:'warn', badge:'b-warn', txt:'Fora' }
    return { cls:'', badge:'b-ok', txt:'Hunt' }
  }

  const SVG = {
    espada:'<svg viewBox="0 0 24 24"><path d="M6.9 2 3 3l1 3.9 9.4 9.4 2.9-2.9L6.9 2Zm10.7 13.4-2.2 2.2 1.4 1.4-1 1 1.4 1.5 1.1-1 1.4 1.5 1.5-1.5-3.6-5.1ZM21 3l-3.9 1-4.6 6.4 2.1 2.1L21 6.9 21 3ZM5.6 15.4 2 20.5 3.5 22l1.4-1.5 1.1 1L7.4 20l-1-1 1-1-1.8-2.6Z"/></svg>',
    alvo:'<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 3a7 7 0 1 1 0 14 7 7 0 0 1 0-14Zm0 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0 2.6a1.4 1.4 0 1 1 0 2.8 1.4 1.4 0 0 1 0-2.8Z"/></svg>',
  }
  function tile (cls, ico, k, v, sub){
    const img = SVG[ico] || (ehImg(ico) ? '<img src="'+esc(url(ico))+'" alt="">' : ico)
    return '<div class="tile '+cls+'"><div class="th"><span class="ic">'+img+'</span>'+
      '<span class="tk">'+k+'</span></div><div class="tv">'+v+'</div>'+
      (sub?'<div class="ts">'+sub+'</div>':'')+'</div>'
  }
  const stat = (v, lbl, det)=>'<div class="st"><div class="sv">'+v+'</div><div class="sl">'+lbl+'</div>'+
    (det?'<div class="sd">'+det+'</div>':'')+'</div>'

  // ===================== painel de UMA conta =====================
  function painelConta (st){
    if(!st || st.ok===false) return '<div class="na">jogo não respondeu (logou?)</div>'
    let h=''
    // TUDO daqui pra baixo sai do dado vivo do WS (st.live) e das taxas calculadas pelo
    // leitor (st.taxa). O analyzer do jogo (st.an) nao manda mais em nada: ele so chega
    // enquanto o painel Hunt Analyzer estiver aberto no jogo e congelava a tela inteira.
    const L=st.live||{}, T=st.taxa||{}
    const k=L.kills, c=L.caught, xp=L.xp, xph=T.xpH
    const att=(L.caught||0)+(L.brokenBalls||0), taxaCap=att>0?(L.caught/att*100):null
    const bola=(st.ballList&&st.ballList.length&&st.ballList[0].icon)||BALL_ICON.poke
    const pot=spriteDe(st.cura,'heal')||BALLBACK.potion

    let s=''
    if(st.fin&&st.fin.loot!=null) s+=tile('t-gold','$','Loot da hunt',money(st.fin.loot),st.fin.lootItens?fmt(st.fin.lootItens)+' itens':'')
    if(xph!=null) s+=tile('t-xp','XP','XP da hunt',curto(xph)+'/h',xp?fmt(xp)+' na sessão':'por hora')
    if(taxaCap!=null) s+=tile('t-good','%','Chance de captura',taxaCap.toFixed(2).replace('.',',')+'%',fmt(c||0)+' de '+fmt(att)+' tentativas')
    if(k!=null) s+=tile('t-good','espada','Derrotados',curto(k),(T.killsH!=null)?fmt(T.killsH)+'/h':fmt(k))
    s+=tile('t-ball',bola,'Balls',curto(st.ballsTotal||0),fmt(st.ballsTotal||0)+' no total')
    s+=tile('t-gold',pot,'Potions',st.potions!=null?curto(st.potions):'—',st.usando?'usando '+esc(st.usando):(st.revives!=null?fmt(st.revives)+' revives':''))
    if(s) h+='<section class="box"><div class="bh"><span class="bt">Sessão atual</span>'+
      (st.huntSec?'<span class="bv">'+dur(st.huntSec)+' na hunt</span>':'')+'</div><div class="tiles">'+s+'</div></section>'

    // saldo, no formato do Hunt Analyzer do jogo
    const F=st.fin
    if(F && F.loot!=null){
      const li=(v,lbl,det,cls)=>'<div class="lin '+(cls||'')+'"><span class="ll">'+lbl+(det?' <em>'+esc(det)+'</em>':'')+'</span><span class="lv">'+v+'</span></div>'
      let b=li('+'+money(F.loot),'Loot',F.lootItens?fmt(F.lootItens)+' itens':'','pos')
      if(F.capturas) b+=li('+'+money(F.capturas),'Capturas','','pos')
      // FOTO DE SHINY: entra no Saldo mas o jogo NAO conta no Loot (medido 23/07). Sem essa
      // linha o total (que ja inclui a foto) nao fechava com Loot+Capturas−Supply. E' preco de
      // MERCADO (a unica linha que nao e' NPC), entao vai marcada.
      if(F.foto) b+=li('+'+money(F.foto),'Foto de shiny',(F.fotos?fmt(F.fotos)+(F.fotos>1?' fotos':' foto'):'')+' · mercado','pos')
      if(F.supply!=null) b+=li('−'+money(Math.abs(F.supply)),'Supply',
        [F.bolas?fmt(F.bolas)+' bolas':'',F.potions?fmt(F.potions)+' potions':'',
         F.supplyParcial?'sem preço no catálogo':''].filter(Boolean).join(' · '),'neg')
      // rotulo do total: cita a foto so quando ela existe, senao continua "Loot + Capturas − Supply"
      const rotTot = F.foto ? 'Loot + Capturas + Foto − Supply' : 'Loot + Capturas − Supply'
      h+='<section class="box"><div class="bh"><span class="bt">Saldo da hunt</span>'+
        (F.fonte==='vivo'?'<span class="bv est">ao vivo · preço de NPC</span>':(F.aprox?'<span class="bv est">estimado</span>':''))+'</div><div class="linhas">'+b+'</div>'+
        (F.saldo!=null?'<div class="tot"><span>'+rotTot+'</span><b class="'+(F.saldo<0?'neg':'pos')+'">'+
          (F.saldo<0?'':'+')+money(F.saldo)+'</b></div>':'')+
        (F.cashH!=null?'<div class="ph2"><span>por hora</span><b>'+(F.cashH<0?'':'+')+money(F.cashH)+'/h</b></div>':'')+'</section>'
    }

    // shiny: só as estrelas (dourada = seu, cinza = perdido)
    h+='<section class="box"><div class="bh"><span class="bt">Shiny</span>'+
      (st.photos!=null?'<span class="bv">'+fmt(st.photos)+' achados na hunt</span>':'')+'</div><div class="stats">'+
      stat('<span class="stg">★</span> '+fmt(L.shiniesCaught||0),'caught shiny','')+
      stat('<span class="stc">★</span> '+fmt(st.brokenShiny||0),'broken shiny',L.shinyWild?fmt(L.shinyWild)+' escaparam':'')+
      '</div></section>'

    // HP do time (o WS dá o do líder; o DOM só via o canvas)
    const hp = (st.lider&&st.lider.hp!=null)?st.lider.hp:st.hp, hpMax=(st.lider&&st.lider.maxHp)||st.hpMax
    if(hp!=null && hpMax){
      const p=Math.max(0,Math.min(100,hp/hpMax*100)), cls=p<25?'low':(p<60?'mid':'')
      let dir=''; if(st.hunt&&st.hunt.timer)dir=st.hunt.timer; if(st.hunt&&st.hunt.wild!=null)dir+=(dir?' · ':'')+st.hunt.wild+' selvagem'
      h+='<div class="prog"><div class="ph"><span class="pt">HP do time</span>'+
        '<span class="pv">'+fmt(hp)+' / '+fmt(hpMax)+(dir?'   '+esc(dir):'')+'</span></div>'+
        '<div class="track"><div class="fill '+cls+'" style="width:'+p.toFixed(0)+'%"></div></div></div>'
    }

    // bolas e cura, com o sprite do jogo
    const item=(src,qty,nome,extra,ic)=>'<span class="item'+(qty===0?' zero':'')+(extra||'')+'" title="'+esc(nome)+'">'+
      (src?'<img class="'+(ic||'')+'" src="'+esc(url(src))+'" alt="">':'<small>'+esc(nome)+'</small>')+fmt(qty)+'</span>'
    // O dashboard e' o painel COMPLETO: mostra TODOS os tipos de bola, mas com a que a hunt
    // GASTA (st.ballAtiva) em primeiro e marcada "em uso". Antes mostrava so a maior por
    // QUANTIDADE + a Idle — no Vileplume isso punha a Poke Ball (9.185, parada) na frente da
    // Ultra Ball (a que sustenta a caca). Mesma correcao do card em 23/07: quem manda no
    // destaque e no alerta e' a bola usada, nao a mais numerosa.
    let bolas=''
    if(Array.isArray(st.ballList)&&st.ballList.length){
      const ativa=st.ballAtiva||st.ballList[0]
      const ordem=st.ballList.slice().sort((a,b)=> a===ativa?-1 : b===ativa?1 : (b.qty||0)-(a.qty||0))
      ordem.forEach(b=>{ bolas+=item(b.icon||BALL_ICON[b.key], b.qty, b.name+(b===ativa?' (em uso)':''),
        b===ativa?' uso':'', b.idle?'idle':'') })
    } else { const bl=st.balls||{}; BALL_ORDER.forEach(x=>{ if(bl[x]!=null) bolas+=item(BALL_ICON[x],bl[x],BALL_LABELS[x]||x,'',x==='idle'?'idle':'') }) }
    if(bolas) h+='<div class="sec"><div class="sech">Bolas <em>'+fmt(st.ballsTotal||0)+' no total</em></div><div class="items">'+bolas+'</div></div>'
    if(Array.isArray(st.cura)&&st.cura.length){
      const its=st.cura.map(p=>item(p.icon,p.qty,p.name,p.name===st.usando?' uso':'')).join('')
      h+='<div class="sec"><div class="sech">Cura <em>'+
        (st.usando?'usando '+esc(st.usando):fmt(st.potions||0)+' potions · '+fmt(st.revives||0)+' revives')+
        (st.potionsUsed!=null?' · '+fmt(st.potionsUsed)+' gastas na sessão':'')+'</em></div><div class="items">'+its+'</div></div>'
    }

    // drops da sessão, como o painel do jogo
    if(Array.isArray(st.drops)&&st.drops.length){
      const li=st.drops.map(d=>'<div class="drop"><span class="dn">'+
        (d.icon?'<img src="'+esc(url(d.icon))+'" alt="">':'<i class="ph"></i>')+esc(d.name)+'</span>'+
        '<span class="dq">×'+fmt(d.qty)+'</span><span class="dg">'+money(d.gold||0)+'</span></div>').join('')
      h+='<section class="box"><div class="bh"><span class="bt">Drops da sessão</span></div><div class="drops">'+li+'</div></section>'
    }

    // capturas (com o filtro de qualidade dentro da própria seção)
    const ult = (capFilter==='all') ? L.lastCatch : ((L.catches||[]).slice().reverse().find(passaFiltro)||null)
    let cap=''
    if(ult) cap+='<div class="last">'+(ult.shiny?'★ ':'🎁 ')+(capFilter==='all'?'última':'última '+capNome())+': '+
      esc(ult.name||'?')+' · '+qtier(ult.quality)+' '+mult(ult.quality)+' · IV '+(ult.ivTotal!=null?ult.ivTotal:'?')+'</div>'
    if(L.rareDrops && L.rareDrops.length) cap+='<div class="rare">💎 '+L.rareDrops.map(esc).join('  ·  ')+'</div>'
    if(Array.isArray(L.catches) && L.catches.length){
      const list=L.catches.filter(passaFiltro).slice(-25).reverse()
      if(list.length) cap+='<div class="caps">'+list.map(x=>{ const tr=qtier(x.quality), col=TCOL[tr]||'var(--muted)'
        return '<div class="cap'+(x.shiny?' sh':'')+'"><span class="cn">'+esc(x.name||'?')+' <span class="civ">IV '+(x.ivTotal!=null?x.ivTotal:'?')+'</span></span><span class="cq" style="color:'+col+'">'+tr+' '+mult(x.quality)+'</span></div>' }).join('')+'</div>'
      else cap+='<div class="na">nenhuma captura nesse filtro</div>'
    }
    h+='<section class="box"><div class="bh"><span class="bt">Capturas</span>'+
      '<span class="capsel"><select id="capfilter">'+
        ['all|Todas as qualidades','shiny|★ Só shiny','1.0|Comum ou melhor','1.1|Incomum ou melhor','1.3|Rara ou melhor',
         '1.5|Épica ou melhor','1.7|Lendária ou melhor','2.0|Mítica ou melhor','3.0|Anciã ou melhor','4.0|Divina']
        .map(o=>{ const [v,t]=o.split('|'); return '<option value="'+v+'"'+(v===capFilter?' selected':'')+'>'+t+'</option>' }).join('')+
      '</select></span></div>'+(cap||'<div class="na">sem capturas ainda</div>')+'</section>'
    return h
  }

  // ===================== painel "Todas" (o essencial somado) =====================
  function painelTodas (rows){
    let bolas=0,pot=0,rev=0,lend=0,profit=0,temPot=false,temRev=false,temProfit=false,pico=null,rico=null,loot=0,cashH=0
    rows.forEach(r=>{ const st=r.state; if(!st||st.ok===false)return
      bolas+=st.ballsTotal||0
      if(st.potions!=null){ pot+=st.potions; temPot=true; if(!pico)pico=spriteDe(st.cura,'heal') }
      if(st.revives!=null){ rev+=st.revives; temRev=true; if(!rico)rico=spriteDe(st.cura,'revive') }
      lend+=lendarios(st)
      if(st.fin&&st.fin.saldo!=null){ profit+=st.fin.saldo; temProfit=true }
      if(st.fin&&st.fin.loot!=null) loot+=st.fin.loot
      if(st.fin&&st.fin.cashH!=null) cashH+=st.fin.cashH })
    const vivas=rows.filter(r=>alertOf(r.state).badge==='b-ok').length
    let h='<section class="box"><div class="bh"><span class="bt">Todas as contas</span>'+
      '<span class="bv">'+vivas+' de '+rows.length+' na hunt</span></div><div class="tiles">'+
      tile('t-gold','$','Profit total',temProfit?(profit<0?'':'+')+money(profit):'—',cashH?money(cashH)+'/h somados':'')+
      tile('t-ball',BALL_ICON.poke,'Pokébolas',curto(bolas),fmt(bolas)+' no total')+
      tile('t-gold',pico||BALLBACK.potion,'Potions',temPot?curto(pot):'—',fmt(pot))+
      tile('t-good',rico||BALLBACK.revive,'Revives',temRev?fmt(rev):'—','')+
      tile('t-gold','★','Lendários',fmt(lend),'qualidade ≥ 1,7')+
      tile('t-gold','$','Loot somado',loot?money(loot):'—','')+
      '</div></section>'
    // uma linha por conta, pra bater o olho
    h+='<section class="box"><div class="bh"><span class="bt">Por conta</span></div><div class="linhas">'+
      rows.map(r=>{ const st=r.state, a=alertOf(st), sal=st&&st.fin&&st.fin.saldo
        return '<div class="lin '+(sal!=null?(sal<0?'neg':'pos'):'')+'">'+
          '<span class="ll">'+esc(nameOf(r.num))+' <em>'+a.txt+'</em></span>'+
          '<span class="lv">'+(sal!=null?(sal<0?'':'+')+money(sal):'—')+'</span></div>' }).join('')+
      '</div></section>'
    return h
  }

  // ===================== render =====================
  function render (rows){
    ultimas = rows
    if(sel!=='todas' && !rows.some(r=>String(r.num)===String(sel))) sel='todas'
    // navegação
    $('#nav').innerHTML = '<div class="navh">Painel</div>'+
      '<button class="navb'+(sel==='todas'?' on':'')+'" data-sel="todas"><i class="'+
        (rows.some(r=>alertOf(r.state).cls==='down')?'down':(rows.some(r=>alertOf(r.state).cls==='warn')?'warn':''))+
        '"></i><span>Todas</span></button>'+
      '<div class="navsep"></div><div class="navh">Contas</div>'+
      rows.map(r=>{ const a=alertOf(r.state), dex=r.state&&r.state.lider&&r.state.lider.speciesId
        return '<button class="navb'+(String(r.num)===String(sel)?' on':'')+'" data-sel="'+r.num+'">'+
          (dex?'<img src="'+spritePng(dex)+'" alt="">':'<i class="'+a.cls+'"></i>')+
          '<span>'+esc(nameOf(r.num))+'</span></button>' }).join('')
    $('#nav').querySelectorAll('.navb').forEach(b=>b.onclick=()=>{
      sel=b.dataset.sel; localStorage.setItem('pml_sel',sel); render(ultimas) })

    // painel
    if(sel==='todas'){
      $('#pane').innerHTML = '<div class="hero"><div class="hinfo"><h2>Todas as contas</h2>'+
        '<p>o essencial somado — abra uma conta na lista pra ver os detalhes</p></div>'+
        '<span class="hb b-ok">'+rows.length+(rows.length===1?' conta':' contas')+'</span></div>' + painelTodas(rows)
    } else {
      const r = rows.find(x=>String(x.num)===String(sel))
      const st = r.state, a = alertOf(st), lid = st&&st.lider
      const sub=[]
      if(lid&&lid.name) sub.push((lid.shiny?'★ ':'')+lid.name+(lid.level?' · nv '+lid.level:''))
      else if(st&&st.active) sub.push(st.active)
      if(st&&st.zone) sub.push(st.zone)
      if(st&&st.hunt&&st.hunt.slug&&!sub.length) sub.push(st.hunt.slug)
      const dex = lid && lid.speciesId
      $('#pane').innerHTML =
        '<div class="hero">'+(dex?'<span class="glow"></span><img class="art" src="'+spriteAnim(dex)+
          '" onerror="this.onerror=null;this.src=\''+spritePng(dex)+'\'" alt="">':'')+
        '<div class="hinfo"><h2>'+esc(nameOf(r.num))+'</h2>'+
        '<p>'+(sub.length?esc(sub.join('  ·  ')):'acompanhe o progresso na hunt')+'</p></div>'+
        '<span class="hb '+a.badge+'">'+a.txt+'</span>'+
        // lixeira propria do dashboard: zera a sessao DESTA conta (mesmo `cardReset`/__vpReset
        // que a lixeira do card). O painel do jogo nao zera junto — ver a ancora no analyzer.
        '<button class="zerar" id="zerar" data-num="'+r.num+'" title="Zerar as estatísticas desta conta (o mesmo que o jogo faz ao trocar de hunt)">🗑</button>'+
        '</div>' + painelConta(st)
      const cf=$('#capfilter')
      if(cf) cf.onchange=()=>{ capFilter=cf.value; localStorage.setItem('pml_capfilter',capFilter); render(ultimas) }
      const zb=$('#zerar')
      if(zb) zb.onclick=async ()=>{ zb.disabled=true; try{ await window.ml.cardReset(parseInt(zb.dataset.num,10)) }catch(e){}; refresh() }
    }
    const vivas=rows.filter(r=>alertOf(r.state).badge==='b-ok').length
    $('#status').classList.toggle('off',vivas===0)
    $('#statustxt').textContent = vivas+'/'+rows.length+' na hunt'
  }

  async function refresh (){
    if(busy||document.hidden)return; busy=true
    try{
      const r=await window.ml.readDashboard()
      if(!r||!r.available){ $('#pane').innerHTML='<div class="na">Leitor indisponível.</div>'; return }
      if(!r.results||!r.results.length){ $('#pane').innerHTML='<div class="na">Nenhuma conta aberta.</div>'; $('#nav').innerHTML=''; return }
      render(r.results)
      const d=new Date(); $('#stamp').textContent='atualizado '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')
    }catch(e){ $('#pane').innerHTML='<div class="na">Erro: '+esc(e.message)+'</div>' }
    finally{ busy=false }
  }

  $('#x').onclick=()=>window.close()
  let pinned=false
  $('#pin').onclick=()=>{ pinned=!pinned; window.ml.dashboardPin(pinned); $('#pin').classList.toggle('on',pinned) }
  const lb=$('#lowball'); lb.value=LOW; lb.addEventListener('input',()=>{ LOW=parseInt(lb.value)||0; localStorage.setItem('pml_lowball',LOW); refresh() })
  $('#rgrip').addEventListener('mousedown',(e)=>{ e.preventDefault()
    const sx=e.screenX, sy=e.screenY, sw=window.outerWidth, sh=window.outerHeight
    const mv=(ev)=>window.ml.dashboardResize(sw+(ev.screenX-sx), sh+(ev.screenY-sy))
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up) }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up) })
  setInterval(()=>{ if($('#auto').checked) refresh() },4000)
  refresh()
</script>
</body>
</html>
