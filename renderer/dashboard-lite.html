<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Dashboard das contas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Design system VP (mesmo do vperts.com.br / vpertz-lab): rubi + dourado + carvão,
     Cinzel no display e Inter na interface. Layout dos cards = "Modelo 3". */
  :root{
    --bg:#0a0605; --surface:#150d0b; --surface-2:#1e1210; --surface-3:#261712;
    --line:rgba(216,138,74,.18); --line-strong:rgba(229,179,79,.4);
    --red:#c33629; --red-2:#e24b35; --red-deep:#8e1d19;
    --gold:#e5b34f; --gold-soft:#d98350; --cream:#f7eee7;
    --muted:#b5a196; --faint:#7d6d64;
    --good:#4fc47a; --mid:#e0a93c; --bad:#ff6b55; --xp:#9146ff; --ball:#5b9be6;
    --radius:16px; --ease:cubic-bezier(.22,.7,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--cream);
    font-family:Inter,system-ui,-apple-system,sans-serif;
    background:radial-gradient(120% 90% at 0% 0%,#1b0f0b 0%,var(--bg) 60%)}

  /* ---------- barra de título ---------- */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:9px 8px 9px 13px;
    background:linear-gradient(90deg,#170807,#2a0f0b 50%,#170807);
    border-bottom:1px solid rgba(226,75,53,.22);-webkit-app-region:drag}
  .bar .t{display:flex;align-items:center;gap:10px;min-width:0}
  .bar .logo{width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  .bar .tt{font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:15px;color:var(--gold);
    letter-spacing:.06em;line-height:1.1}
  .bar .tt small{display:block;font-family:Inter,sans-serif;font-weight:600;font-size:8.5px;
    color:var(--faint);text-transform:uppercase;letter-spacing:.16em;margin-top:2px}
  .live-dot{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;
    color:var(--good);background:rgba(79,196,122,.1);border:1px solid rgba(79,196,122,.32);
    border-radius:99px;padding:4px 10px;-webkit-app-region:no-drag;white-space:nowrap}
  .live-dot i{width:7px;height:7px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 0 rgba(79,196,122,.6);animation:pulse 2.2s infinite}
  .live-dot.off{color:var(--bad);background:rgba(255,107,85,.1);border-color:rgba(255,107,85,.35)}
  .live-dot.off i{background:var(--bad);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,196,122,.5)}70%{box-shadow:0 0 0 7px rgba(79,196,122,0)}100%{box-shadow:0 0 0 0 rgba(79,196,122,0)}}
  .wbtns{display:flex;gap:2px;-webkit-app-region:no-drag}
  .bar button{-webkit-app-region:no-drag;background:transparent;border:0;color:var(--faint);
    font-size:13px;cursor:pointer;border-radius:8px;width:27px;height:27px;line-height:1;transition:.15s var(--ease)}
  .bar button:hover{color:var(--cream);background:rgba(255,255,255,.08)}
  #pin.on{color:var(--gold);background:rgba(229,179,79,.16)}
  #x:hover{color:#fff;background:var(--red-2)}

  .capbar{display:flex;align-items:center;gap:8px;height:36px;padding:0 13px;
    border-bottom:1px solid var(--line);background:#0d0807}
  .capbar span{font-size:9.5px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.1em;
    font-weight:800;white-space:nowrap}
  .capbar select{flex:1;background:#0b0706;border:1px solid var(--line);border-radius:9px;
    color:var(--cream);padding:5px 9px;font-family:inherit;font-size:12px;font-weight:600;outline:none;cursor:pointer}
  .capbar select:focus{border-color:var(--gold)}

  .wrap{height:calc(100% - 45px - 36px - 44px);overflow-y:auto;padding:12px;
    display:flex;flex-direction:column;gap:12px}
  .wrap::-webkit-scrollbar{width:7px}
  .wrap::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px}

  /* ---------- tiles (Modelo 3) ---------- */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px}
  .tile{background:linear-gradient(160deg,var(--surface-2),rgba(11,7,6,.9));
    border:1px solid var(--line);border-radius:13px;padding:11px 12px;min-width:0;
    transition:border-color .18s var(--ease),transform .18s var(--ease)}
  .tile:hover{border-color:var(--line-strong);transform:translateY(-1px)}
  /* th com altura fixa: rótulo de 2 linhas nao pode empurrar o valor pra baixo e
     desalinhar a fileira de tiles */
  .tile{display:flex;flex-direction:column}
  .tile .th{display:flex;align-items:center;gap:8px;margin-bottom:9px;min-height:33px}
  .tile .ic{width:31px;height:31px;flex:none;border-radius:9px;display:grid;place-items:center;
    font-size:14px;font-weight:800;line-height:1;border:1px solid currentColor;background:rgba(255,255,255,.03)}
  .tile .ic img{width:21px;height:21px;object-fit:contain;image-rendering:pixelated}
  .tile .ic svg{width:15px;height:15px;fill:currentColor}
  .tile .tk{font-size:9px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;
    color:var(--muted);line-height:1.25;min-width:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tile .ts{margin-top:auto}
  .tile .tv{font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:19px;line-height:1;
    color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile .ts{font-size:9.5px;color:var(--faint);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t-gold .ic{color:var(--gold)}      .t-gold .tv{color:var(--gold)}
  .t-good .ic{color:var(--good)}      .t-good .tv{color:var(--good)}
  .t-xp   .ic{color:var(--xp)}
  .t-ball .ic{color:var(--ball)}
  .t-red  .ic{color:var(--red-2)}     .t-red .tv{color:var(--bad)}
  .t-mut  .ic{color:var(--faint)}
  .tile.zero .tv{color:var(--bad)}

  /* ---------- quadro geral ---------- */
  .geral{background:linear-gradient(160deg,rgba(34,20,17,.95),rgba(13,8,7,.96));
    border:1px solid var(--line-strong);border-radius:var(--radius);overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.35);flex:none}
  .gthead{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:0;
    cursor:pointer;padding:12px 14px;font-family:inherit;text-align:left;color:var(--cream)}
  .gthead:hover{background:rgba(255,255,255,.03)}
  .geral .gt{font-family:'Cinzel',serif;font-weight:800;font-size:13px;color:var(--gold);letter-spacing:.07em}
  .geral.open .chev{transform:rotate(90deg);color:var(--gold-soft)}
  .gbody{padding:0 14px 14px}
  .gbody[hidden]{display:none}

  /* ---------- conta ---------- */
  .acc{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;flex:none;
    background:linear-gradient(160deg,rgba(30,18,16,.6),rgba(13,8,7,.6));transition:border-color .18s var(--ease)}
  .acc.down{border-color:rgba(226,75,53,.55)} .acc.warn{border-color:rgba(229,179,79,.45)}
  .ahead{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:0;cursor:pointer;
    padding:12px 13px;color:var(--cream);font-family:inherit;text-align:left}
  .ahead:hover{background:rgba(255,255,255,.03)}
  .chev{color:var(--faint);font-size:11px;transition:transform .2s var(--ease);flex:none;width:12px}
  .acc.open .chev{transform:rotate(90deg);color:var(--gold-soft)}
  .aname{font-family:'Cinzel',serif;font-weight:800;font-size:15px;color:var(--cream);flex:none;
    max-width:112px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.03em}
  .aquick{flex:1;min-width:0;color:var(--muted);font-size:11.5px;display:flex;gap:10px;flex-wrap:wrap;overflow:hidden}
  .aquick b{color:var(--cream);font-weight:800}
  .abadge{flex:none;font-size:10px;font-weight:800;padding:4px 10px;border-radius:99px;white-space:nowrap;
    text-transform:uppercase;letter-spacing:.05em}
  .b-ok{color:#0c1a10;background:var(--good)} .b-warn{color:#1a1405;background:var(--mid)} .b-down{color:#fff;background:var(--red-2)}
  .abody{padding:0 13px 14px;display:flex;flex-direction:column;gap:11px}
  .abody[hidden]{display:none}

  /* ---------- barra (estilo "Progresso da Hunt") ---------- */
  .prog{background:#0b0706;border:1px solid var(--line);border-radius:13px;padding:11px 13px}
  .prog .ph{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .prog .pt{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft)}
  .prog .pv{font-size:11px;color:var(--muted);font-weight:700}
  .track{height:9px;border-radius:6px;background:#170d0b;border:1px solid var(--line);overflow:hidden}
  .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#3ae07c,#1fb959);transition:width .4s var(--ease)}
  .fill.mid{background:linear-gradient(90deg,var(--mid),var(--gold-soft))}
  .fill.low{background:linear-gradient(90deg,var(--red-2),var(--red))}

  /* ---------- itens (bolas / cura) ---------- */
  .sec{border-top:1px dashed var(--line);padding-top:10px}
  .sech{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft);
    margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .sech em{font-style:normal;color:var(--faint);letter-spacing:.02em;text-transform:none;font-weight:600;font-size:10px}
  .items{display:flex;gap:7px;flex-wrap:wrap}
  .item{display:flex;align-items:center;gap:7px;background:#0d0807;border:1px solid var(--line);
    border-radius:10px;padding:6px 10px;font-size:13.5px;font-weight:800;color:var(--cream)}
  .item.zero{border-color:rgba(226,75,53,.5);color:#ff9d8d}
  .item.uso{border-color:var(--line-strong);background:rgba(229,179,79,.08)}
  .item img{width:20px;height:20px;object-fit:contain;image-rendering:pixelated;flex:none}
  .item .sp{width:20px;height:20px;flex:none;background-repeat:no-repeat;background-position:center}
  .item small{font-size:9.5px;color:var(--faint);font-weight:600}

  .last{font-size:12.5px;font-weight:700;color:var(--cream);background:rgba(145,70,255,.09);
    border:1px solid rgba(145,70,255,.3);border-radius:11px;padding:8px 11px}
  .rare{font-size:11px;font-weight:700;color:#ffe0a0;background:rgba(229,179,79,.1);
    border:1px solid rgba(229,179,79,.4);border-radius:10px;padding:6px 10px}
  .caps{display:flex;flex-direction:column;gap:3px;border-top:1px dashed var(--line);padding-top:8px;
    max-height:158px;overflow-y:auto}
  .caps::-webkit-scrollbar{width:6px}.caps::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
  .cap{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;padding:1px 0}
  .cap .cn{color:var(--cream);font-weight:700} .cap .civ{color:var(--faint);font-size:10.5px}
  .cap .cq{font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums}
  .cap.sh .cn::before{content:'★ ';color:var(--gold)}
  .na{color:var(--faint);font-style:italic;font-size:12px;text-align:center;padding:18px}
  .sub{font-size:11.5px;color:var(--muted);line-height:1.5}

  .ft{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 13px;
    border-top:1px solid var(--line);height:44px;background:#0d0807}
  .ft label{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px}
  .ft input[type=number]{width:58px;background:#0b0706;border:1px solid var(--line);border-radius:7px;
    color:var(--cream);padding:3px 6px;font-family:inherit;font-size:11px}
  .ft .stamp{font-size:10px;color:var(--faint)}
  .rgrip{position:fixed;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;-webkit-app-region:no-drag;opacity:.55}
  .rgrip:hover{opacity:1}
  .rgrip::after{content:"";position:absolute;right:3px;bottom:3px;width:12px;height:12px;
    background:linear-gradient(135deg,transparent 45%,var(--gold-soft) 45% 55%,transparent 55%),
      linear-gradient(135deg,transparent 65%,var(--gold-soft) 65% 75%,transparent 75%),
      linear-gradient(135deg,transparent 85%,var(--gold-soft) 85% 95%,transparent 95%)}
</style>
</head>
<body>
  <div class="bar">
    <span class="t"><img src="logo-vp.png" class="logo" alt="VP"><span class="tt">DASHBOARD<small>das contas</small></span></span>
    <span class="live-dot" id="status"><i></i><span id="statustxt">—</span></span>
    <div class="wbtns">
      <button id="pin" title="Fixar no topo">📌</button>
      <button id="x" title="Fechar">✕</button>
    </div>
  </div>
  <div class="capbar">
    <span>Capturas</span>
    <select id="capfilter">
      <option value="all">Todas as qualidades</option>
      <option value="shiny">★ Só shiny</option>
      <option value="1.0">Comum ou melhor</option>
      <option value="1.1">Incomum ou melhor</option>
      <option value="1.3">Rara ou melhor</option>
      <option value="1.5">Épica ou melhor</option>
      <option value="1.7">Lendária ou melhor</option>
      <option value="2.0">Mítica ou melhor</option>
      <option value="3.0">Anciã ou melhor</option>
      <option value="4.0">Divina</option>
    </select>
  </div>
  <div class="wrap" id="wrap"><div class="na">carregando…</div></div>
  <div class="ft">
    <label><input type="checkbox" id="auto" checked /> auto (4s)</label>
    <label>avisar &lt; <input type="number" id="lowball" value="500"> bolas</label>
    <span class="stamp" id="stamp"></span>
  </div>
  <div class="rgrip" id="rgrip" title="Arraste pra redimensionar"></div>
<script>
  const $ = (s) => document.querySelector(s)
  const fmt = (n) => Number(n || 0).toLocaleString('pt-BR')
  const money = (n) => (n < 0 ? '-$' : '$') + Math.abs(Number(n || 0)).toLocaleString('pt-BR')
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]))
  const curto = (n) => { n = Number(n||0)
    if(n>=1e9) return (n/1e9).toFixed(1).replace('.',',')+'B'
    if(n>=1e6) return (n/1e6).toFixed(1).replace('.',',')+'M'
    if(n>=1e3) return (n/1e3).toFixed(1).replace('.',',')+'k'
    return String(n) }
  const namesMap = () => { try { return JSON.parse(localStorage.getItem('pml_names') || '{}') } catch { return {} } }
  const nameOf = (n) => namesMap()[n] || ('Conta ' + n)
  // ícone local só como fallback calibrado (sprites markitems são 32x32 com a bola de 15x15)
  const BALL_ICON = { poke:'https://poke.idleworld.online/assets/markitems/pokeball.png', great:'https://poke.idleworld.online/assets/markitems/greatball.png', super:'https://poke.idleworld.online/assets/markitems/superball.png', ultra:'https://poke.idleworld.online/assets/markitems/ultraball.png', idle:'https://poke.idleworld.online/assets/markitems/idleball.png' }
  const BALL_ORDER = ['poke','great','super','ultra','idle','master']
  const BALL_LABELS = { poke:'Poké', great:'Great', super:'Super', ultra:'Ultra', idle:'Idle', master:'Master' }
  // faixas conferem com a tabela oficial do jogo (pokepedia /systems/quality)
  function qtier (q){ if(q==null)return ''; if(q<1)return 'Fraca'; if(q<1.1)return 'Comum'; if(q<1.3)return 'Incomum'; if(q<1.5)return 'Rara'; if(q<1.7)return 'Épica'; if(q<2)return 'Lendária'; if(q<3)return 'Mítica'; if(q<4)return 'Anciã'; return 'Divina' }
  const TCOL = { 'Épica':'#b07bd8','Lendária':'#e5b34f','Mítica':'#ff6bd0','Anciã':'#ff8f3d','Divina':'#5fe0e0','Rara':'#5b9be6','Incomum':'#5fd38a','Comum':'#c9c9c9','Fraca':'#8a8f97' }
  // quality é o MULTIPLICADOR de status do poke — mostrar o número junto do tier
  const mult = (q)=> q==null ? '' : '×'+Number(q).toFixed(3).replace('.',',')
  const passaFiltro = (c)=>{ if(capFilter==='all')return true
    if(capFilter==='shiny')return !!c.shiny
    return (c.quality||0)>=parseFloat(capFilter) }
  const capLabel = ()=>{ const s=$('#capfilter'); return s&&s.selectedIndex>=0 ? s.options[s.selectedIndex].text.toLowerCase() : '' }

  let LOW = parseInt(localStorage.getItem('pml_lowball') || '500') || 500
  let capFilter = localStorage.getItem('pml_capfilter') || 'all'
  const openSet = new Set()
  let geralOpen = localStorage.getItem('pml_geralopen') !== '0'
  let busy = false, firstRender = true

  function alertOf (st){
    if(!st || st.ok===false) return { cls:'down', badge:'b-down', txt:'Off' }
    if(st.live && st.live.offline) return { cls:'down', badge:'b-down', txt:'Caiu' }   // session-replaced
    if(st.balls && Object.keys(st.balls).length){
      if(st.ballsTotal===0) return { cls:'down', badge:'b-down', txt:'Sem bolas' }
      if(st.ballsTotal<LOW) return { cls:'warn', badge:'b-warn', txt:'Bolas' }
    }
    if(!st.hunt || !st.hunt.seen) return { cls:'warn', badge:'b-warn', txt:'Fora' }
    return { cls:'', badge:'b-ok', txt:'Hunt' }
  }

  // Ícones monocromáticos (herdam a cor do tile). Emoji sai colorido e briga com a paleta;
  // ★ e ● já são texto puro, então só espada e alvo precisam de desenho.
  const SVG = {
    espada:'<svg viewBox="0 0 24 24"><path d="M6.9 2 3 3l1 3.9 9.4 9.4 2.9-2.9L6.9 2Zm10.7 13.4-2.2 2.2 1.4 1.4-1 1 1.4 1.5 1.1-1 1.4 1.5 1.5-1.5-3.6-5.1ZM21 3l-3.9 1-4.6 6.4 2.1 2.1L21 6.9 21 3ZM5.6 15.4 2 20.5 3.5 22l1.4-1.5 1.1 1L7.4 20l-1-1 1-1-1.8-2.6Z"/></svg>',
    alvo:'<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 3a7 7 0 1 1 0 14 7 7 0 0 1 0-14Zm0 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0 2.6a1.4 1.4 0 1 1 0 2.8 1.4 1.4 0 0 1 0-2.8Z"/></svg>',
  }
  // tile do Modelo 3: ícone quadrado colorido + rótulo em caixa alta + valor grande + sub
  function tile (cls, ico, k, v, sub, extra){
    const img = /^https?:/.test(ico) ? '<img src="'+esc(ico)+'" alt="">' : (SVG[ico] || ico)
    return '<div class="tile '+cls+(extra||'')+'"><div class="th"><span class="ic">'+img+'</span>'+
      '<span class="tk">'+k+'</span></div><div class="tv">'+v+'</div>'+
      (sub?'<div class="ts">'+sub+'</div>':'')+'</div>'
  }

  function renderGeral (rows){
    let inHunt=0, alerts=0, kills=0, caught=0, shiny=0, broken=0, balls=0, loot=0, cashH=0, hasLoot=false
    rows.forEach(r=>{ const st=r.state, a=alertOf(st), A=st&&st.an
      if(a.badge==='b-ok') inHunt++; else alerts++
      if(st && st.live){
        kills+=(A&&A.kills!=null)?A.kills:(st.live.kills||0)       // oficial do jogo quando houver
        caught+=(A&&A.caught!=null)?A.caught:(st.live.caught||0)
        shiny+=st.live.shiniesCaught||0
        broken+=st.brokenShiny||0
      }
      if(st && st.ballsTotal!=null) balls+=st.ballsTotal
      if(A && A.loot!=null){ loot+=A.loot; hasLoot=true }
      if(A && A.cashH!=null) cashH+=A.cashH
    })
    return '<div class="geral'+(geralOpen?' open':'')+'"><button class="gthead"><span class="chev">▸</span>'+
      '<span class="gt">QUADRO GERAL</span></button><div class="gbody"'+(geralOpen?'':' hidden')+'>'+
      '<div class="tiles">'+
        tile('t-good','espada','Kills',curto(kills),fmt(kills)+' no total')+
        tile('t-gold','alvo','Capturas',fmt(caught),inHunt+' de '+rows.length+' na hunt')+
        (hasLoot?tile('t-gold','$','Loot',money(loot),cashH?money(cashH)+'/h somados':''):'')+
        tile('t-gold','★','Caught shiny',fmt(shiny),'somando as contas')+
        tile('t-mut','★','Broken shiny',fmt(broken),'ball gasta no shiny')+
        tile('t-ball','●','Balls',curto(balls),alerts?alerts+' conta(s) em alerta':'nenhum alerta')+
      '</div></div></div>'
  }

  function bodyHtml (st){
    if(!st || st.ok===false) return '<div class="na">jogo não respondeu (logou?)</div>'
    let h=''
    const L=st.live||{}, A=st.an
    const info=[]; if(st.level!=null)info.push('Nível '+st.level); if(st.zone)info.push(st.zone); if(st.active)info.push(st.active)
    if(info.length) h+='<div class="sub">'+esc(info.join('  ·  '))+'</div>'

    // ---- tiles da conta ----
    const k=(A&&A.kills!=null)?A.kills:L.kills, c=(A&&A.caught!=null)?A.caught:L.caught
    const att=(L.caught||0)+(L.brokenBalls||0), taxa=att>0?(L.caught/att*100):null
    let xph=null, aprox=''
    if(A&&A.xpH!=null) xph=A.xpH
    else { const hrs=L.startTs?(Date.now()-L.startTs)/3600000:0; if(hrs>0.004){ xph=Math.round(L.xp/hrs); aprox='~' } }
    let t=''
    if(A&&A.loot!=null) t+=tile('t-gold','$','Loot',money(A.loot),A.cashH!=null?money(A.cashH)+'/h':'')
    if(xph!=null) t+=tile('t-xp','XP','XP da hunt',aprox+curto(xph),'por hora')
    // 6 tiles = 2 fileiras de 3 certinhas. As capturas ja aparecem no cabecalho da conta,
    // entao viram o subtexto da taxa em vez de um 7o tile orfao numa linha so.
    if(taxa!=null) t+=tile('t-good','%','Taxa de captura',taxa.toFixed(2).replace('.',',')+'%',fmt(c||0)+' de '+fmt(att)+' tentativas')
    if(k!=null) t+=tile('t-good','espada','Kills',curto(k),fmt(k)+' derrotados')
    // shiny: só as estrelas — dourada pro capturado, cinza pro perdido
    t+=tile('t-gold','★','Caught shiny',fmt(L.shiniesCaught||0),(st.photos!=null?fmt(st.photos)+' achados na hunt':''))
    t+=tile('t-mut','★','Broken shiny',fmt(st.brokenShiny||0),(L.shinyWild?fmt(L.shinyWild)+' escaparam':''))
    if(t) h+='<div class="tiles">'+t+'</div>'

    // ---- HP do time (barra estilo "Progresso da Hunt") ----
    if(st.hp!=null && st.hpMax){
      const p=Math.max(0,Math.min(100,st.hp/st.hpMax*100))
      const cls=p<25?'low':(p<60?'mid':'')
      let dir=''; if(st.hunt&&st.hunt.timer)dir=st.hunt.timer; if(st.hunt&&st.hunt.wild!=null)dir+=(dir?' · ':'')+st.hunt.wild+' selvagem'
      h+='<div class="prog"><div class="ph"><span class="pt">HP do time</span>'+
        '<span class="pv">'+fmt(st.hp)+' / '+fmt(st.hpMax)+(dir?'   '+esc(dir):'')+'</span></div>'+
        '<div class="track"><div class="fill '+cls+'" style="width:'+p.toFixed(0)+'%"></div></div></div>'
    }

    // ---- bolas (catálogo do jogo) ----
    const ballItem=(key,name,qty,icon)=>{
      let img
      if(BALL_ICON[key]) img='<span class="sp" style="background-image:url('+BALL_ICON[key]+');background-size:'+(key==='idle'?'contain':'213%')+'"></span>'
      else if(icon) img='<img src="'+esc(icon)+'" alt="">'
      else img='<small>'+esc(name)+'</small>'
      return '<span class="item'+(qty===0?' zero':'')+'" title="'+esc(name)+'">'+img+fmt(qty)+'</span>'
    }
    let bolas=''
    if(Array.isArray(st.ballList)&&st.ballList.length) st.ballList.forEach(b=>{ bolas+=ballItem(b.key,b.name,b.qty,b.icon) })
    else { const bl=st.balls||{}; BALL_ORDER.forEach(x=>{ if(bl[x]!=null) bolas+=ballItem(x,BALL_LABELS[x]||x,bl[x],null) }) }
    if(bolas) h+='<div class="sec"><div class="sech">Bolas <em>'+fmt(st.ballsTotal||0)+' no total</em></div><div class="items">'+bolas+'</div></div>'

    // ---- cura: ícone REAL de cada potion, e destaque na que está sendo gasta ----
    if(Array.isArray(st.cura)&&st.cura.length){
      const usando=st.usando
      const its=st.cura.map(p=>'<span class="item'+(p.qty===0?' zero':'')+(p.name===usando?' uso':'')+'" title="'+esc(p.name)+(p.name===usando?' — em uso':'')+'">'+
        (p.icon?'<img src="'+esc(p.icon)+'" alt="">':'')+fmt(p.qty)+'</span>').join('')
      h+='<div class="sec"><div class="sech">Cura <em>'+
        (usando?'usando '+esc(usando):fmt(st.potions||0)+' potions · '+fmt(st.revives||0)+' revives')+
        (st.potionsUsed!=null?' · '+fmt(st.potionsUsed)+' gastas na sessão':'')+'</em></div>'+
        '<div class="items">'+its+'</div></div>'
    }

    // ---- capturas ----
    const ult = (capFilter==='all') ? L.lastCatch : ((L.catches||[]).slice().reverse().find(passaFiltro)||null)
    if(ult){ h+='<div class="last">'+(ult.shiny?'★ ':'🎁 ')+(capFilter==='all'?'última':'última '+capLabel())+': '+
      esc(ult.name||'?')+' · '+qtier(ult.quality)+' '+mult(ult.quality)+' · IV '+(ult.ivTotal!=null?ult.ivTotal:'?')+'</div>' }
    if(L.rareDrops && L.rareDrops.length) h+='<div class="rare">💎 '+L.rareDrops.map(esc).join('  ·  ')+'</div>'
    if(Array.isArray(L.catches) && L.catches.length){
      const list=L.catches.filter(passaFiltro).slice(-25).reverse()
      if(list.length) h+='<div class="caps">'+list.map(x=>{ const tr=qtier(x.quality), col=TCOL[tr]||'var(--muted)'
        return '<div class="cap'+(x.shiny?' sh':'')+'"><span class="cn">'+esc(x.name||'?')+' <span class="civ">IV '+(x.ivTotal!=null?x.ivTotal:'?')+'</span></span><span class="cq" style="color:'+col+'">'+tr+' '+mult(x.quality)+'</span></div>' }).join('')+'</div>'
      else h+='<div class="sub" style="color:var(--faint);font-style:italic">nenhuma captura nesse filtro</div>'
    }
    return h
  }

  function quickLine (st){
    if(!st || st.ok===false) return '<span>—</span>'
    const L=st.live||{}, A=st.an, parts=[]
    const k=(A&&A.kills!=null)?A.kills:L.kills, c=(A&&A.caught!=null)?A.caught:L.caught
    if(k!=null) parts.push('<b>'+curto(k)+'</b>')
    if(c!=null) parts.push('◎ <b>'+fmt(c)+'</b>')
    if(st.ballsTotal!=null) parts.push('● <b>'+curto(st.ballsTotal)+'</b>')
    if((L.shiniesCaught||0)>0) parts.push('★ <b>'+fmt(L.shiniesCaught)+'</b>')
    return parts.join('') || '<span>—</span>'
  }

  function render (rows){
    const wrap=$('#wrap')
    wrap.innerHTML = renderGeral(rows) + rows.map(r=>{
      const st=r.state, a=alertOf(st), nm=nameOf(r.num), open=openSet.has(r.num)
      return '<div class="acc '+a.cls+(open?' open':'')+'" data-num="'+r.num+'">'+
        '<button class="ahead"><span class="chev">▸</span>'+
          '<span class="aname">'+esc(nm)+'</span>'+
          '<span class="aquick">'+quickLine(st)+'</span>'+
          '<span class="abadge '+a.badge+'">'+a.txt+'</span></button>'+
        '<div class="abody"'+(open?'':' hidden')+'>'+bodyHtml(st)+'</div></div>'
    }).join('')
    wrap.querySelectorAll('.acc').forEach(el=>{
      const num=+el.dataset.num
      el.querySelector('.ahead').onclick=()=>{ if(openSet.has(num))openSet.delete(num); else openSet.add(num)
        const op=openSet.has(num); el.classList.toggle('open',op); el.querySelector('.abody').hidden=!op }
    })
    const gh=wrap.querySelector('.gthead')
    if(gh) gh.onclick=()=>{ geralOpen=!geralOpen; localStorage.setItem('pml_geralopen',geralOpen?'1':'0')
      const g=wrap.querySelector('.geral'); g.classList.toggle('open',geralOpen); g.querySelector('.gbody').hidden=!geralOpen }
    // pastilha de status no topo
    const vivas=rows.filter(r=>alertOf(r.state).badge==='b-ok').length
    const stEl=$('#status'); stEl.classList.toggle('off',vivas===0)
    $('#statustxt').textContent = vivas+'/'+rows.length+(vivas===1?' na hunt':' na hunt')
  }

  async function refresh (){
    if(busy||document.hidden)return; busy=true   // minimizado/coberto nao varre as contas
    try{
      const r=await window.ml.readDashboard()
      if(!r||!r.available){ $('#wrap').innerHTML='<div class="na">Leitor indisponível.</div>'; return }
      if(!r.results||!r.results.length){ $('#wrap').innerHTML='<div class="na">Nenhuma conta aberta.</div>'; return }
      if(firstRender){ r.results.forEach(row=>{ const a=alertOf(row.state); if(a.cls) openSet.add(row.num) }); firstRender=false }
      render(r.results)
      const d=new Date(); $('#stamp').textContent='atualizado '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')
    }catch(e){ $('#wrap').innerHTML='<div class="na">Erro: '+esc(e.message)+'</div>' }
    finally{ busy=false }
  }

  $('#x').onclick=()=>window.close()
  let pinned=false
  $('#pin').onclick=()=>{ pinned=!pinned; window.ml.dashboardPin(pinned); $('#pin').classList.toggle('on',pinned) }
  const lb=$('#lowball'); lb.value=LOW; lb.addEventListener('input',()=>{ LOW=parseInt(lb.value)||0; localStorage.setItem('pml_lowball',LOW); refresh() })
  const cf=$('#capfilter'); cf.value=capFilter; cf.addEventListener('change',()=>{ capFilter=cf.value; localStorage.setItem('pml_capfilter',capFilter); refresh() })
  $('#rgrip').addEventListener('mousedown',(e)=>{ e.preventDefault()
    const sx=e.screenX, sy=e.screenY, sw=window.outerWidth, sh=window.outerHeight
    const mv=(ev)=>window.ml.dashboardResize(sw+(ev.screenX-sx), sh+(ev.screenY-sy))
    const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up) }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up) })
  setInterval(()=>{ if($('#auto').checked) refresh() },4000)
  refresh()
</script>
</body>
</html>
