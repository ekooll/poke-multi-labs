<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>overlay</title>
<link rel="stylesheet" href="./fonts/fonts.css"><!-- fontes locais: 1 overlay por conta, eram 4 fetches -->
<style>
  /* Card que flutua SOBRE a tela do jogo daquela conta (um por conta).
     Fundo transparente: só o card aparece, no estilo do site.
     O card ocupa 100% da view: quem define tamanho/posição é o main (card:size / card:move),
     senão o resize do usuário não teria efeito nenhum. */
  :root{
    --line:rgba(216,138,74,.2); --line-strong:rgba(229,179,79,.45);
    --gold:#e5b34f; --gold-soft:#d98350; --cream:#f7eee7;
    --muted:#b5a196; --faint:#8a7a70; --good:#4fc47a; --mid:#e0a93c; --bad:#ff6b55;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    color:var(--cream);font-family:Inter,system-ui,sans-serif;
    -webkit-user-select:none;cursor:default}
  /* #app precisa esticar: sem isso o .card (height:100%) herdava a altura do CONTEUDO em vez
     da altura da view, e o resize do usuario nao mudava nada de verdade. */
  #app{height:100%}
  .card{position:relative;overflow:hidden;height:100%;display:flex;flex-direction:column;
    border:1px solid var(--line-strong);border-radius:15px;padding:9px 11px 3px;
    background:linear-gradient(160deg,rgba(30,18,16,.93),rgba(9,6,5,.94));
    box-shadow:0 14px 40px rgba(0,0,0,.7),0 0 0 1px rgba(229,179,79,.1);
    backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
  /* cantos ornamentados, como as molduras do site */
  .card::before{content:"";position:absolute;width:14px;height:14px;border-color:var(--gold);
    opacity:.6;pointer-events:none;top:5px;left:5px;border-top:2px solid;border-left:2px solid;border-top-left-radius:7px}
  /* marca d'agua: pokebola desenhada em SVG (vetorial e embutida). Nao usei imagem de CDN
     porque o card e redimensionavel - um PNG de 640px ficaria borrado ao crescer - e porque
     app desktop nao deve depender de rede pra desenhar a propria UI (mesma razao das fontes).
     Opacidade baixissima de proposito: e textura, nao ilustracao. */
  .card::after{content:"";position:absolute;right:-30px;bottom:-34px;width:176px;height:176px;
    pointer-events:none;z-index:0;opacity:.06;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='none' stroke='%23e5b34f' stroke-width='5'><circle cx='50' cy='50' r='45'/><path d='M5 50h30M65 50h30'/><circle cx='50' cy='50' r='15'/></g></svg>") center/contain no-repeat}

  /* ---- cabecalho: avatar redondo + nick/nv + acoes ---- */
  /* flex:none no cabecalho, no HP e no grip: sem isso, ao encolher o card o conteudo
     empurrava o grip pra fora do overflow:hidden e o card ficava SEM area de arrasto. */
  /* header compacto e SEM borda embaixo: as barras de HP/XP grudam logo abaixo do nome (a
     divisoria antiga jogava as barras pra longe do nome) */
  .h{display:flex;align-items:center;gap:9px;padding-bottom:2px;margin-bottom:2px;flex:none;
    position:relative;z-index:2;cursor:grab}
  .h:active{cursor:grabbing}
  .h .acts{cursor:default}
  .av{width:38px;height:38px;flex:none;border-radius:50%;position:relative;
    border:1px solid var(--line-strong);background:radial-gradient(circle at 50% 42%,#2a1a14,#0b0706);
    box-shadow:inset 0 0 12px rgba(0,0,0,.7),0 2px 8px rgba(0,0,0,.5);
    display:grid;place-items:center;overflow:hidden}
  .av img{width:34px;height:34px;object-fit:contain;image-rendering:pixelated;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))}
  .who{flex:1;min-width:0}
  /* Inter, NAO Cinzel: Cinzel e uma fonte de capitulares romanas, nao tem minusculas -
     o nick "ekoo_" saia desenhado como "EKOO_". O nick tem que sair como o dono digitou. */
  .n{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:13.5px;letter-spacing:.01em;
    display:flex;align-items:baseline;gap:6px;min-width:0}
  .n .nick{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,.8)}
  .n .tl{flex:none;font-size:9.5px;font-weight:800;letter-spacing:.06em;color:var(--gold);
    background:rgba(229,179,79,.12);border:1px solid rgba(229,179,79,.28);
    border-radius:99px;padding:1px 6px;text-transform:uppercase}
  .sub{margin-top:2px;font-size:10px;font-weight:600;color:var(--muted);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sub .sh{color:var(--gold)}
  .sub .lv{color:var(--gold-soft);font-weight:800}
  .acts{display:flex;align-items:center;gap:5px;flex:none}
  /* estado da conta = SO a cor do circulo (o dono tirou os rotulos "HUNT"/"FORA": a bolinha
     ja diz tudo e sobra espaco no cabecalho). O texto vive no title, pro hover. */
  .b{width:9px;height:9px;flex:none;border-radius:50%;padding:0;
     box-shadow:0 0 0 2px rgba(0,0,0,.4), 0 0 8px rgba(0,0,0,.5)}
  .b-ok{background:var(--good)} .b-warn{background:var(--mid)} .b-down{background:#e24b35}
  .b-ok{animation:pulseOk 2.4s infinite}
  @keyframes pulseOk{0%{box-shadow:0 0 0 2px rgba(0,0,0,.4),0 0 0 0 rgba(79,196,122,.5)}
    70%{box-shadow:0 0 0 2px rgba(0,0,0,.4),0 0 0 6px rgba(79,196,122,0)}
    100%{box-shadow:0 0 0 2px rgba(0,0,0,.4),0 0 0 0 rgba(79,196,122,0)}}
  /* tempo na hunt, entre o nome e a bolinha */
  .tempo{font-size:9.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;
    white-space:nowrap;letter-spacing:.02em}
  .ico{width:21px;height:21px;flex:none;display:grid;place-items:center;cursor:pointer;
    border:1px solid var(--line);border-radius:7px;background:rgba(255,255,255,.04);
    color:var(--muted);font-size:11px;line-height:1;transition:.14s}
  .ico:hover{color:var(--bad);border-color:rgba(255,107,85,.5);background:rgba(255,107,85,.1)}
  .ico.ok{color:var(--good);border-color:rgba(79,196,122,.5)}

  /* ---- linhas de numeros ---- */
  .rows{position:relative;z-index:2;display:flex;flex-direction:column;flex:1 1 auto;min-height:0;overflow-y:auto}
  .rows::-webkit-scrollbar{width:0}
  .r{display:flex;align-items:center;gap:8px;padding:3px 0}
  .r+.r{border-top:1px solid rgba(216,138,74,.09)}
  /* overflow hidden: rede de seguranca. Sprite que venha maior que a caixa e' CORTADO, nunca
     empurra a linha nem invade a de cima/baixo. */
  /* ===== PADRAO DE ICONE DO CARD: 19x19, TRAVADO (pedido do dono 24/07/2026) =====
     Todo icone de linha — sprite (img) OU emoji/texto (span, ver .r .i span) — vive nesta caixa
     de 19x19 e deve encher/aparentar esse tamanho. Nao criar tamanhos diferentes por linha. */
  .r .i{width:19px;height:19px;flex:none;display:grid;place-items:center;overflow:hidden}
  .r .i img{width:19px;height:19px;object-fit:contain;image-rendering:pixelated}
  /* MOLDURA VAZIA: os sprites de bola do jogo tem 32x32 com o desenho ocupando so 15x15 — 53%
     do arquivo e transparente. Com contain em 19px a bola saia com 8,9px contra os 19px do
     potion/revive: parecia menos da metade. A caixa de 40px com margem negativa iguala a altura
     DESENHADA sem empurrar a linha.
     MAS isso NAO vale pra todo sprite: medido em 23/07/2026, `idleball.png` tem canvas 17x15 e
     desenho 17x15 — 100% preenchido, zero moldura. Aplicar o mesmo aumento nela dobrava o
     tamanho e o icone invadia as linhas vizinhas. Por isso a classe `.z` nao e' fixa no CSS:
     quem decide e' o `onload`, olhando o naturalWidth do arquivo (ver `linha()`). Sprite novo
     do jogo se ajusta sozinho, sem ninguem lembrar de vir aqui. */
  .r .i.ball img.z{width:40px;height:40px;margin:-10px}
  /* SPRITE DO POKEMON DA HUNT (linha Lendaria, .i.poke): FALLBACK. O tamanho real e' medido por
     bounding box no JS (ver AJUSTA_POKE em linha()) e sobrescrito via style inline, pra CADA
     pokemon encher igual a caixa de 19x19. Este 29px so vale se a medicao falhar (CORS/taint). */
  .r .i.poke img{width:29px;height:29px;margin:-5px}
  /* ICONES DE TEXTO/EMOJI (Derrotados ⚔, Profit $, Lendaria ✨ quando nao tem sprite): font-size
     ALTO pra encher a caixa de 19px e ficar do MESMO tamanho visual dos sprites de
     ball/potion/revive. PADRAO TRAVADO -> 19x19 e o tamanho UNICO de todo icone de linha do card
     (ver .r .i e .r .i img). NAO voltar pra 13px: em 24/07/2026 os 3 de baixo sumiam de pequenos. */
  .r .i span{font-size:19px;line-height:1;color:var(--gold)}
  .r .l{flex:1;min-width:0;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  /* Inter, nao Cinzel: numero de painel pede fonte de interface. Cinzel e display de
     capitulares romanas - a serifa pesa em 14px e ela nao traz a feature `tnum`, entao o
     tabular-nums nao pegava e o valor MUDAVA DE LARGURA a cada atualizacao (13.541 -> 13.432
     dancava na tela). Inter tem tnum de verdade: as colunas ficam firmes. */
  .r .v{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:14px;
    font-variant-numeric:tabular-nums;letter-spacing:-.01em;
    white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,.8)}
  .r.zero .v{color:var(--bad)} .r.warn .v{color:var(--mid)}
  .v.pos{color:var(--good)} .v.neg{color:var(--bad)}
  /* separador das linhas com dois numeros (Derrotados = kills/capturas, Shiny = shinies/capturas):
     barra faint entre os dois valores tabulares, so pra nao grudarem. Nao muda a cor dos numeros. */
  .r .v .sep{color:var(--faint);font-weight:600;margin:0 2px}

  /* (CSS antigo do HP-do-rodape removido: a regra `.hp{margin-top:6px}` COLIDIA com a classe
     `hp` do preenchimento da barra nova e empurrava o verde 6px pra baixo — parecia "meio cheio
     na altura". O XP nao tinha esse conflito, por isso enchia certo.) */

  /* ---- barras de HP/XP do lider (estilo card do jogo, sob o nome) ---- */
  /* margin-top pequeno: as barras sobem, ficando logo abaixo do nome (nao mais soltas embaixo) */
  .herobars{position:relative;z-index:2;display:flex;flex-direction:column;gap:3px;margin:2px 0 3px;flex:none}
  /* .hbar centraliza o texto por FLEX (mais robusto que absolute+inset — o valor estava
     subindo no eixo vertical por causa da metrica da fonte) */
  /* trilha = SULCO ESCURO (parte vazia da barra, padrao de progresso — nao "espaco vago"). A
     BORDA marca o comprimento total, entao as duas barras leem como do mesmo tamanho, cheias
     ou nao. O que enganava antes era so o preenchimento (%) diferente. */
  /* SEM flex na barra: o flex (align-items:center) empurrava o preenchimento absoluto pra baixo,
     deixando o topo do verde vazio. Agora o fill usa top:0/bottom:0 puro (altura cheia) e o
     texto centraliza pelo proprio .hin absoluto. */
  .hbar{position:relative;height:19px;border-radius:7px;overflow:hidden;
    background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.15);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.45)}
  /* top:0 + bottom:0 (em vez de height:100%): forca o verde a ocupar a ALTURA TODA da barra. Com
     height:100% + display:flex no pai, o preenchimento absoluto era empurrado pra baixo (comecava
     7px abaixo do topo) — parecia "meio cheio na altura". top+bottom ancora nas duas pontas e
     ignora o alinhamento do flex. SEM transition: o verde acompanha o valor na hora (sem gap). */
  .hfill{position:absolute;left:0;top:0;bottom:0}
  .hfill.hp{background:linear-gradient(90deg,#3fae66,#7ee6a0)}
  .hfill.hp.mid{background:linear-gradient(90deg,#e0a93c,#f5cd6b)}
  .hfill.hp.low{background:linear-gradient(90deg,#e24b35,#ff8a76)}
  .hfill.xp{background:linear-gradient(90deg,#c99a2e,#f0cf6b)}
  /* valor centralizado (flex do pai) + CONTORNO PRETO pra ficar legivel sobre a barra colorida */
  /* .hin absoluto cobrindo a barra + flex proprio pra centralizar o texto (nao afeta o .hfill) */
  .hbar .hin{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;line-height:1;
    font-family:Inter,system-ui,sans-serif;font-size:11px;font-weight:800;color:#fff;
    letter-spacing:.02em;font-variant-numeric:tabular-nums;
    text-shadow:-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 1px 2px rgba(0,0,0,.85)}
  .hbar .ko{color:#ffb3a6;font-weight:800;margin-left:6px}
  /* XP sem a curva aprendida ainda: listrado faint (nao finge 0% nem 100%) */
  .hbar.aprendendo .hfill.xp{width:100%!important;opacity:.2;
    background:repeating-linear-gradient(45deg,#c99a2e 0 6px,transparent 6px 12px)}

  /* ---- grip: arrastar o card (igual ao modal do dashboard) ---- */
  .grip{position:relative;z-index:3;height:14px;flex:none;display:grid;place-items:center;
    cursor:grab;margin-top:2px}
  .grip:active{cursor:grabbing}
  .grip i{display:block;width:26px;height:2px;border-radius:2px;background:var(--faint);
    box-shadow:0 4px 0 var(--faint),0 -4px 0 var(--faint);opacity:.55;transition:.14s}
  .grip:hover i{opacity:1;background:var(--gold-soft);box-shadow:0 4px 0 var(--gold-soft),0 -4px 0 var(--gold-soft)}
  /* canto de redimensionar */
  .rz{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;z-index:4}
  .rz::after{content:"";position:absolute;right:4px;bottom:4px;width:7px;height:7px;
    border-right:2px solid var(--faint);border-bottom:2px solid var(--faint);opacity:.6;border-radius:0 0 3px 0}
  .rz:hover::after{border-color:var(--gold);opacity:1}
  .off{padding:14px;text-align:center;color:var(--faint);font-style:italic;font-size:11px}

  /* ---- ultima captura que casa com o filtro (multiplicador + IV) ---- */
  .ult{position:relative;z-index:2;flex:none;margin-top:5px;font-size:9.5px;font-weight:600;
    color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ult .q{font-weight:800}
  .ult .iv{color:var(--faint)}

  /* ---- dropdown de qualidades (abre pelo grip) ---- */
  .dd{position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;border-radius:15px;
    background:linear-gradient(160deg,rgba(24,14,12,.985),rgba(7,5,4,.99));padding:9px 10px}
  .dd h4{margin:0 0 6px;font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
    color:var(--gold-soft);display:flex;align-items:center;gap:6px}
  .dd h4 .x{margin-left:auto;cursor:pointer;color:var(--faint);font-size:12px}
  .dd h4 .x:hover{color:var(--bad)}
  .dl{flex:1;min-height:0;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;align-content:start}
  .dl::-webkit-scrollbar{width:0}
  .qi{display:flex;align-items:center;gap:5px;cursor:pointer;padding:2px 3px;border-radius:6px;
    font-size:10px;font-weight:700;transition:.12s}
  .qi:hover{background:rgba(255,255,255,.06)}
  .qi .bx{width:11px;height:11px;flex:none;border:1.5px solid var(--faint);border-radius:3px;
    display:grid;place-items:center;font-size:8px;line-height:1;color:#0c1a10}
  .qi.on .bx{background:var(--gold);border-color:var(--gold)}
  .qi .n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .qi .c{margin-left:auto;color:var(--faint);font-variant-numeric:tabular-nums;font-weight:600}
  .ddf{flex:none;display:flex;gap:6px;margin-top:6px;font-size:9px}
  .ddf span{cursor:pointer;color:var(--gold-soft);text-decoration:underline}
  .ddf span:hover{color:var(--gold)}
</style>
</head>
<body>
  <div id="app"><div class="card"><div class="off">…</div></div></div>
<script>
  const NUM = +(new URLSearchParams(location.search).get('num') || 0)
  const GAME = 'https://poke.idleworld.online'
  const DEX = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/'
  // Sprites SHINY do proprio Poke Idle, extraidos dos canvas do painel "Todos os Shinys"
  // (22/07/2026). A arte do jogo e diferente da PokeAPI - o Golem shiny daqui e ROXO, o da
  // PokeAPI e rosado. Local: funciona offline e e o desenho que o dono ve no jogo.
  const SPR = './sprites/shiny/'
  // Variantes de hunt (Enraged Typhlosion, Ancient Marowak...) usam IDs proprios do jogo,
  // 10501-10547. Recortadas do marker-atlas do Mapa e nomeadas pelo mesmo id que o WS manda.
  const SPR_HUNT = './sprites/hunt/'
  const fmt = (n)=>Number(n||0).toLocaleString('pt-BR')
  const money = (n)=>(n<0?'-$':'$')+Math.abs(Number(n||0)).toLocaleString('pt-BR')
  // "a / b" com a barra faint entre dois valores (Derrotados = kills/capturas, Shiny = shinies/capturas)
  const par = (a,b)=> fmt(a)+'<span class="sep">/</span>'+fmt(b)
  // compacto pro XP (177.699.808 -> "177,7M") — o valor cru nao cabe dentro da barra
  const curto = (n)=>{ n=Number(n||0); if(n<1000)return String(n)
    if(n<1e6)return (n/1e3).toFixed(n<1e4?1:0).replace('.',',')+'k'
    if(n<1e9)return (n/1e6).toFixed(1).replace('.',',')+'M'
    return (n/1e9).toFixed(2).replace('.',',')+'B' }
  const esc = (s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
  // ATENCAO: nome solto (ex "ultraball.png") = item do jogo e vira /assets/items/<nome>.
  // Por isso caminho LOCAL precisa comecar com "./" e sair intacto - senao ./sprites/hunt/
  // 10522.png virava /assets/items/sprites/hunt/10522.png e a imagem quebrava (0x0).
  const url = (s)=> !s ? null : (/^(https?:|data:|\.\/)/.test(s) ? s : (s.charAt(0)==='/' ? GAME+s : GAME+'/assets/items/'+s))
  const ehImg = (s)=> !!s && (/^(https?:|data:)/.test(s) || s.indexOf('/')>=0)
  const POKE = GAME+'/assets/markitems/pokeball.png'
  const BACK = { potion: GAME+'/assets/markitems/ultra_potion.png', revive: GAME+'/assets/markitems/revive.png' }
  const nameOf = (n)=>{ try{ return (JSON.parse(localStorage.getItem('pml_names')||'{}'))[n] || ('Conta '+n) }catch{ return 'Conta '+n } }
  const lowBall = ()=>parseInt(localStorage.getItem('pml_lowball')||'500')||500
  // Faixas de qualidade: as MESMAS do dashboard e da tabela oficial (pokepedia /systems/quality).
  const TIERS = ['Fraca','Comum','Incomum','Rara','Épica','Lendária','Mítica','Anciã','Divina']
  const TCOL = { 'Fraca':'#8a8f97','Comum':'#c9c9c9','Incomum':'#5fd38a','Rara':'#5b9be6','Épica':'#b07bd8',
                 'Lendária':'#e5b34f','Mítica':'#ff6bd0','Anciã':'#ff8f3d','Divina':'#5fe0e0' }
  const qtier = (q)=>{ if(q==null)return ''; if(q<1)return 'Fraca'; if(q<1.1)return 'Comum'; if(q<1.3)return 'Incomum'
    if(q<1.5)return 'Rara'; if(q<1.7)return 'Épica'; if(q<2)return 'Lendária'; if(q<3)return 'Mítica'
    if(q<4)return 'Anciã'; return 'Divina' }
  const mult = (q)=> q==null ? '' : '×'+Number(q).toFixed(3).replace('.',',')

  // Quais qualidades o dono quer contar no card. Guardado por conta: cada tela pode vigiar
  // uma coisa. Padrao = o antigo "Lendarios" (Lendaria pra cima).
  const CHAVE_T = 'pml_card_tiers_' + NUM
  const PADRAO = ['Lendária','Mítica','Anciã','Divina']
  let tiersSel = (()=>{ try{ const s=JSON.parse(localStorage.getItem(CHAVE_T)); return Array.isArray(s)&&s.length?s:PADRAO }catch{ return PADRAO } })()
  const salvaTiers = ()=>{ try{ localStorage.setItem(CHAVE_T, JSON.stringify(tiersSel)) }catch{} }

  // SO as capturas DESTA sessao. `catches` e historico (o dashboard vive dele e nao pode
  // perder), entao o corte e pelo `ts` contra o marco da sessao: assim a lixeira zera
  // Derrotados, Profit E a linha de qualidade/ultima captura juntos, como o dono espera.
  // Captura velha (gravada antes desta versao) nao tem `ts` -> fica so no historico.
  const capturas = (st)=>{
    const c = st&&st.live&&st.live.catches; if(!Array.isArray(c)) return []
    const t0 = st.live.sessTs
    return t0 ? c.filter(x=>x && x.ts && x.ts >= t0) : c
  }
  const casaTier = (x)=> tiersSel.indexOf(qtier(x.quality)) >= 0
  const lends = (st)=> capturas(st).filter(casaTier)
  const lendarios = (st)=>lends(st).length
  // rotulo da linha: 1 tier = o nome dele; varios = o menor + "…" (nao cabe lista inteira)
  const rotuloTier = ()=>{
    if(!tiersSel.length) return 'Nenhuma'
    if(tiersSel.length === 1) return tiersSel[0]
    const ord = TIERS.filter(t=>tiersSel.indexOf(t)>=0)
    return ord[0] + (ord.length>1 ? '+' : '')
  }
  // icone dos Lendarios = POKEMON DA HUNT (o mob que esta na tela agora, via `field` do WS).
  // Fora da hunt nao ha mob: cai no ultimo lendario capturado e, sem ele, na estrela.
  // Onde buscar o desenho de cada especie:
  //  id >= 10000 -> variante de hunt: sprite do jogo (a PokeAPI nao tem, so vai ate ~1025)
  //  shiny       -> sprite shiny do jogo (a arte daqui e outra: o Golem shiny e ROXO)
  //  resto       -> PokeAPI
  const daPokeApi = (id)=> id!=null && id > 0 && id < 10000
  const spriteDe1 = (id, shiny)=> id == null ? null
    : (id >= 10000 ? SPR_HUNT+id+'.png' : (shiny ? SPR+id+'.png' : (daPokeApi(id) ? DEX+id+'.png' : null)))
  const lendSprite = (st)=>{
    const hm = st && st.live && st.live.huntMob
    if (hm && hm.speciesId != null) { const s = spriteDe1(hm.speciesId, hm.shiny); if (s) return s }
    const l=lends(st); for(let i=l.length-1;i>=0;i--){ const s=spriteDe1(l[i].speciesId, l[i].shiny); if(s) return s }
    return null
  }
  const spriteDe = (lista,cat)=>{ if(!Array.isArray(lista))return null
    const c=lista.filter(x=>x.tipo===cat&&x.icon).sort((a,b)=>b.qty-a.qty)[0]; return c?c.icon:null }

  // tempo na hunt no formato do proprio jogo ("0s", "3m 28s", "1h 04m")
  const tempoHunt = (s)=>{
    if (s == null || s < 0) return null
    if (s < 60) return s + 's'
    const m = Math.floor(s / 60), h = Math.floor(m / 60)
    return h ? h + 'h ' + String(m % 60).padStart(2,'0') + 'm' : m + 'm ' + String(s % 60).padStart(2,'0') + 's'
  }
  function alertOf (st){
    if(!st||st.ok===false) return { badge:'b-down', txt:'Off' }
    if(st.live&&st.live.offline) return { badge:'b-down', txt:'Caiu' }
    // ALERTA PELA BOLA DA HUNT, nao pelo total. Olhar o total deixava a bolinha VERDE com a
    // Ultra Ball zerada e 9.185 Poke Ball encalhadas: a conta parava de capturar e o card
    // dizia que estava tudo bem. Sem `ballAtiva` (versao antiga do leitor), cai no total.
    const ba = st.ballAtiva
    if(ba){
      if((ba.qty||0)===0) return { badge:'b-down', txt:'Sem '+(ba.name||'bola') }
      if((ba.qty||0)<lowBall()) return { badge:'b-warn', txt:(ba.name||'Bolas') }
    } else if(st.balls&&Object.keys(st.balls).length){
      if(st.ballsTotal===0) return { badge:'b-down', txt:'Sem bolas' }
      if(st.ballsTotal<lowBall()) return { badge:'b-warn', txt:'Bolas' }
    }
    if(!st.hunt||!st.hunt.seen) return { badge:'b-warn', txt:'Fora' }
    return { badge:'b-ok', txt:'Hunt' }
  }
  // icls: classe extra do icone (ver .r .i.ball no CSS - compensa a margem do sprite da bola)
  // `onload` mede o sprite e decide a escala: >=24px de largura = arquivo com moldura vazia
  // (os 32x32 do jogo), entao ganha a classe `.z` que amplia. Sprite justo (idleball, 17x15)
  // fica no tamanho natural. Sem isso, um numero cravado no CSS servia pra uma bola e estourava
  // a outra — foi o que aconteceu em 23/07 (ver o comentario da regra `.r .i.ball img.z`).
  const ZOOM = "if(this.naturalWidth>=24)this.classList.add('z')"
  // SPRITE DO POKEMON DA HUNT: cada arte da PokeAPI ocupa uma fracao diferente do canvas 96x96
  // (Golem enche ~70% e fica otimo; Natu ~45% e ficava minusculo). Tamanho FIXO nunca serve pros
  // dois. Aqui a gente MEDE a bounding box opaca do sprite e escala pra o MAIOR lado do desenho
  // bater 19px, centralizado — assim TODO pokemon fica do mesmo tamanho (padrao 19x19). A medicao
  // usa um Image separado com crossOrigin (o raw.githubusercontent manda ACAO:*); se falhar
  // (taint/erro/CORS), cai no fallback fixo de 29px do CSS `.r .i.poke img`. O <img> visivel do
  // card nunca depende disso — no pior caso mantem o comportamento antigo.
  const AJUSTA_POKE = "(function(g){try{var m=new Image();m.crossOrigin='anonymous';m.onload=function(){try{var w=m.naturalWidth,h=m.naturalHeight;if(!w||!h)return;var c=document.createElement('canvas');c.width=w;c.height=h;var x=c.getContext('2d');x.drawImage(m,0,0);var d=x.getImageData(0,0,w,h).data,mnx=w,mny=h,mxx=0,mxy=0,ok=false,px,py;for(py=0;py<h;py++){for(px=0;px<w;px++){if(d[(py*w+px)*4+3]>16){ok=true;if(px<mnx)mnx=px;if(px>mxx)mxx=px;if(py<mny)mny=py;if(py>mxy)mxy=py;}}}if(!ok)return;var lado=Math.max(mxx-mnx+1,mxy-mny+1),D=Math.round(19*w/lado),mg=Math.round((D-19)/2);g.style.width=D+'px';g.style.height=D+'px';g.style.margin=(-mg)+'px';}catch(e){}};m.src=g.src;}catch(e){}})(this)"
  const linha = (src,lbl,val,cls,icls)=>'<div class="r '+(cls||'')+'"><span class="i '+(icls||'')+'">'+
    (ehImg(src)?'<img src="'+esc(url(src))+'" onload="'+((icls&&icls.indexOf('poke')>=0)?AJUSTA_POKE:ZOOM)+'" alt="">':'<span>'+(src||'')+'</span>')+
    '</span><span class="l">'+lbl+'</span><span class="v">'+val+'</span></div>'

  // ---- BOLAS POR TIPO ----
  // Antes era UMA linha com a soma de tudo. MEDIDO em 23/07/2026, com os tres paineis lado a
  // lado: nosso card dizia 14.266, o widget do jogo dizia "12.670 Ultra + 1.595 Idle" e o
  // Inventario dizia "8999+" (teto dele). Ninguem mentia — a gente somava tipos que a hunt nem
  // usa. No Vileplume o numero saia 84% inflado (20.051 exibidos, 10.866 uteis), e o alerta de
  // "acabando" olhava o total: dava pra zerar a Ultra Ball e o card seguir mostrando nove mil
  // bolas sem aviso. Agora a bola QUE A HUNT GASTA e a linha principal, e o resto vem embaixo.
  const linhaBolas = (st, iconePadrao)=>{
    const lista = Array.isArray(st.ballList) ? st.ballList : null
    if(!lista || !lista.length)   // sem catalogo do WS: cai no comportamento antigo
      return linha(iconePadrao,'Pokébola',fmt(st.ballsTotal||0),
        st.ballsTotal===0?'zero':(st.ballsTotal<lowBall()?'warn':''),'ball')
    const ativa = st.ballAtiva || lista[0]
    // UMA LINHA POR TIPO, todas iguais as demais do card (mesma fonte, mesmo tamanho, mesmo
    // icone do proprio jogo). A primeira versao encolhia e apagava as "outras" numa linha
    // resumida sem sprite — ficou destoando do resto e escondendo informacao que o dono quer
    // ver. O que distingue a bola da hunt nao e' o tamanho da fonte: e' a ORDEM (ela vem
    // primeiro) e o alerta, que so olha pra ela.
    return lista.filter(b=>b===ativa||(b.qty||0)>0)
      .sort((a,b)=> (a===ativa?-1:b===ativa?1:(b.qty||0)-(a.qty||0)))
      .map(b=>{
        const cls = b!==ativa ? '' : ((b.qty||0)===0 ? 'zero' : ((b.qty||0)<lowBall() ? 'warn' : ''))
        return linha(b.icon||iconePadrao, esc(b.name||'Pokébola'), fmt(b.qty||0), cls, 'ball')
      }).join('')
  }

  const rodape = '<div class="grip" id="grip" title="Clique: escolher qualidades · arraste: mover · duplo-clique: volta pro canto"><i></i></div>'+
                 '<div class="rz" id="rz" title="Arraste pra redimensionar"></div>'

  // ultima captura que casa com o filtro, com multiplicador e IV (o dono pediu os dois)
  function ultimaCap (st){
    const c = capturas(st)
    for (let i=c.length-1; i>=0; i--){
      if (!casaTier(c[i])) continue
      const x = c[i], t = qtier(x.quality), cor = TCOL[t] || 'var(--muted)'
      return '<div class="ult" title="Última captura dentro das qualidades escolhidas">'+
        (x.shiny?'✨ ':'')+esc(x.name||'?')+' · <span class="q" style="color:'+cor+'">'+t+' '+mult(x.quality)+'</span>'+
        (x.ivTotal!=null?' · <span class="iv">IV '+x.ivTotal+'</span>':'')+'</div>'
    }
    return '<div class="ult"><span class="iv">nenhuma captura nessas qualidades</span></div>'
  }

  // painel de selecao de qualidades (abre no clique do grip)
  function abreDropdown (st){
    const card = document.querySelector('.card'); if(!card || card.querySelector('.dd')) return
    const c = capturas(st)
    const conta = {}; TIERS.forEach(t => conta[t] = 0)
    c.forEach(x => { const t = qtier(x.quality); if (conta[t] != null) conta[t]++ })
    const dd = document.createElement('div')
    dd.className = 'dd'
    dd.innerHTML = '<h4>Qualidades no card <span class="x" id="ddx">✕</span></h4><div class="dl">'+
      TIERS.map(t => '<label class="qi'+(tiersSel.indexOf(t)>=0?' on':'')+'" data-t="'+t+'">'+
        '<span class="bx">'+(tiersSel.indexOf(t)>=0?'✓':'')+'</span>'+
        '<span class="n" style="color:'+TCOL[t]+'">'+t+'</span>'+
        '<span class="c">'+conta[t]+'</span></label>').join('')+
      '</div><div class="ddf"><span id="ddall">todas</span><span id="ddnone">nenhuma</span><span id="ddstd">padrão</span></div>'
    card.appendChild(dd)
    const aplica = ()=>{ salvaTiers(); dd.remove(); tick() }
    dd.querySelectorAll('.qi').forEach(el => el.onclick = (e)=>{
      e.stopPropagation()
      const t = el.dataset.t, i = tiersSel.indexOf(t)
      if (i >= 0) tiersSel.splice(i,1); else tiersSel.push(t)
      el.classList.toggle('on', i < 0)
      el.querySelector('.bx').textContent = i < 0 ? '✓' : ''
      salvaTiers()
    })
    dd.querySelector('#ddx').onclick = aplica
    dd.querySelector('#ddall').onclick = ()=>{ tiersSel = TIERS.slice(); aplica() }
    dd.querySelector('#ddnone').onclick = ()=>{ tiersSel = []; aplica() }
    dd.querySelector('#ddstd').onclick = ()=>{ tiersSel = PADRAO.slice(); aplica() }
  }

  // ---- BARRAS DE HP E XP DO LIDER (estilo card do jogo) ----
  // HP verde + XP dourado, GROSSAS, com o valor DENTRO, logo abaixo do nome. Tempo real:
  // HP vem de field.heroHp (~3,5x/s), XP/level de poke-xp (por kill) — ver cdp.js `hero`.
  // O % do XP so aparece quando a curva foi aprendida (2 level-ups); senao mostra o xp cru,
  // sem chutar fórmula. Barra "aprendendo" fica listrada em vez de fingir 0%.
  function barrasHeroi (st){
    const h = st && st.hero
    if (!h || (h.hpPct==null && h.level==null)) return ''
    let out = '<div class="herobars">'
    if (h.hpPct != null){
      const cls = h.hpPct<=25 ? 'low' : (h.hpPct<=55 ? 'mid' : '')
      const ko = h.fainted ? ' <span class="ko">KO</span>' : ''
      // valor CENTRALIZADO dentro da barra, igual o card do jogo
      out += '<div class="hbar" title="HP do líder (tempo real)">'+
        '<div class="hfill hp '+cls+'" style="width:'+h.hpPct.toFixed(1)+'%"></div>'+
        '<span class="hin">'+fmt(h.hp)+' / '+fmt(h.maxHp)+ko+'</span></div>'
    }
    if (h.level != null){
      const temPct = h.xpPct != null
      const w = temPct ? h.xpPct.toFixed(1) : 0
      const txt = temPct ? ('EXP '+(h.xpPct<10 ? h.xpPct.toFixed(1) : Math.round(h.xpPct))+'%')
                         : ('EXP · '+(h.xp!=null ? curto(h.xp) : '—'))
      out += '<div class="hbar xp'+(temPct?'':' aprendendo')+'" title="'+(temPct?'XP do nível (tempo real)':'aprendendo a curva — quando sobe de nível vira %')+'">'+
        '<div class="hfill xp" style="width:'+w+'%"></div>'+
        '<span class="hin">'+txt+'</span></div>'
    }
    return out + '</div>'
  }

  let ultimoSt = null   // o dropdown precisa do estado pra mostrar a contagem por qualidade
  async function tick (){
    if(document.hidden) return
    // com o seletor aberto NAO redesenha: o innerHTML novo fecharia o painel na cara do dono
    if(document.querySelector('.dd')) return
    // durante o arrasto NAO redesenha: senao o grip/cabecalho que captura o ponteiro e' destruido
    // e o card congela no meio do movimento (ver o flag `arrastando` em arrasta()).
    if(arrastando) return
    let st=null
    try{ const r=await window.ml.readDashboard()
      const row=(r&&r.results||[]).find(x=>x.num===NUM); st=row&&row.state }catch(e){}
    ultimoSt = st
    const a=alertOf(st)
    if(!st||st.ok===false){
      document.getElementById('app').innerHTML='<div class="card"><div class="h">'+
        '<div class="who"><div class="n"><span class="nick">'+esc(nameOf(NUM))+'</span></div></div>'+
        '<span class="b '+a.badge+'">'+a.txt+'</span></div>'+
        '<div class="off">sem dados ainda</div>'+rodape+'</div>'
      liga(); return
    }
    const lid = st.lider || null
    const dex = lid && lid.speciesId
    // Ordem do avatar: sprite do PROPRIO JOGO (shiny) -> PokeAPI animada -> PokeAPI estatica.
    // O onerror encadeado dispensa manter uma lista de quais ids temos localmente.
    const via = (lid && lid.shiny) ? 'shiny/' : ''
    const gif = dex ? DEX+'versions/generation-v/black-white/animated/'+via+dex+'.gif' : ''
    const png = dex ? DEX+via+dex+'.png' : ''
    const doJogo = (dex && lid && lid.shiny) ? SPR+dex+'.png' : ''
    const bola=(st.ballList&&st.ballList.length&&st.ballList[0].icon)||POKE
    const pot=spriteDe(st.cura,'heal')||BACK.potion, rev=spriteDe(st.cura,'revive')||BACK.revive
    const saldo=st.fin&&st.fin.saldo
    // HP do time: o WS manda o do lider; sem ele cai pro que o DOM leu
    const hp=(lid&&lid.hp!=null)?lid.hp:st.hp, hpMax=(lid&&lid.maxHp)||st.hpMax
    const pct=(hp!=null&&hpMax)?Math.max(0,Math.min(100,hp/hpMax*100)):null
    const hpCls = pct==null?'':(pct<=25?'low':(pct<=55?'mid':''))
    // nivel do treinador: so aparece quando o leitor conseguiu ler (com bridge vivo o DOM
    // nao e varrido - ver cdp.js). Sem valor, some em vez de mostrar "nv null".
    const tl = (st.level!=null) ? '<span class="tl">nv '+fmt(st.level)+'</span>' : ''
    // O tempo so vale quando a bolinha esta VERDE. Antes o contador vinha do field-init e
    // seguia correndo com a conta parada na cidade — bolinha amarela e cronometro andando.
    // Mesma fonte pros dois (st.hunt.seen): ou os dois dizem "cacando", ou nenhum diz.
    const naHunt = !!(st.hunt && st.hunt.seen)
    const tHunt = naHunt ? tempoHunt(st.huntSec) : null
    const kills = (st.live && st.live.kills != null) ? st.live.kills : null
    // Capturados DESTA sessao (lado direito de Derrotados). Mesma fonte da linha de qualidade/ultima
    // captura: capturas() ja corta pelo marco da sessao (sessTs), zerando junto na lixeira.
    const caught = capturas(st).length
    // Linha Shiny = APARICOES de shiny / shiny CAPTURADOS (NAO conta captura de pokemon normal).
    // Contadores da sessao vindos da bridge: st.live.shinies = shiny que apareceu (escapou selvagem
    // + capturado), st.live.shiniesCaught = shiny capturado. Zeram junto com o resto na lixeira.
    const shinyApp = (st.live && st.live.shinies != null) ? st.live.shinies : 0
    const shinyCap = (st.live && st.live.shiniesCaught != null) ? st.live.shiniesCaught : 0
    // ✨ e o mesmo simbolo que o jogo usa pra shiny (botao "✨ Shiny" no Log de Capturas)
    // nivel: o do `hero` (poke-xp, atualiza a cada kill) e mais fresco que o do roster (raro),
    // que ficava 1 atras do card do jogo logo apos subir de nivel. Nunca menor que o roster.
    const nivelPoke = Math.max((st.hero&&st.hero.level)||0, (lid&&lid.level)||0) || (lid&&lid.level)
    const sub = lid && lid.name
      ? '<div class="sub">'+(lid.shiny?'<span class="sh">✨ </span>':'')+esc(lid.name)+
        (nivelPoke?' <span class="lv">nv '+fmt(nivelPoke)+'</span>':'')+'</div>'
      : ''
    document.getElementById('app').innerHTML='<div class="card">'+
      '<div class="h">'+
        '<span class="av">'+(dex?'<img src="'+(doJogo||gif)+'" '+
          'onerror="this.onerror=function(){this.onerror=null;this.src=\''+png+'\'};this.src=\''+gif+'\'" alt="">':'')+'</span>'+
        '<div class="who"><div class="n"><span class="nick">'+esc(nameOf(NUM))+'</span>'+tl+'</div>'+sub+'</div>'+
        '<div class="acts">'+
          (tHunt ? '<span class="tempo" title="Tempo nesta hunt">'+tHunt+'</span>' : '')+
          '<span class="b '+a.badge+'" title="'+a.txt+'"></span>'+
          '<span class="ico" id="zerar" title="Zerar as estatísticas desta conta (o mesmo que o jogo faz ao trocar de hunt)">🗑</span>'+
        '</div>'+
      '</div>'+
      barrasHeroi(st)+
      '<div class="rows">'+
      linhaBolas(st, bola)+
      linha(pot,'Potion',st.potions!=null?fmt(st.potions):'—', st.potions===0?'zero':'')+
      linha(rev,'Revive',st.revives!=null?fmt(st.revives):'—', st.revives===0?'zero':'')+
      linha('⚔','Derrotados',kills!=null?par(kills,caught):'—')+
      linha('✨','Shiny',par(shinyApp,shinyCap))+
      linha(lendSprite(st)||'✨',rotuloTier(),fmt(lendarios(st)),'','poke')+
      linha('$','Profit',saldo!=null?'<span class="v '+(saldo<0?'neg':'pos')+'">'+(saldo<0?'':'+')+money(saldo)+'</span>':'—')+
      '</div>'+
      ultimaCap(st)+
      rodape+'</div>'
    liga()
  }

  // ---- arrastar / redimensionar / zerar ----
  // screenX/screenY e NAO clientX: a view se move junto com o arrasto, entao a coordenada
  // local "anda" com o card e o delta sairia errado (o card fugia ou tremia).
  // enquanto o dono segura pra arrastar, o tick() de 1s NAO pode redesenhar o card: o innerHTML
  // novo destruiria o grip/cabecalho que estao capturando o ponteiro e o arrasto travava no meio
  // (era o "tem hora que nao mexe"). Flag compartilhada por grip/cabecalho/canto de resize.
  let arrastando=false
  function arrasta (el, envia, aoClicar, aceita){
    if(!el) return
    let on=false, lx=0, ly=0, andou=0
    el.addEventListener('pointerdown', e=>{
      if(e.button!==0) return
      if(aceita && !aceita(e)) return
      on=true; arrastando=true; lx=e.screenX; ly=e.screenY; andou=0
      try{ el.setPointerCapture(e.pointerId) }catch(_){}
      e.preventDefault()
    })
    el.addEventListener('pointermove', e=>{
      if(!on) return
      const dx=e.screenX-lx, dy=e.screenY-ly
      if(dx||dy){ lx=e.screenX; ly=e.screenY; andou+=Math.abs(dx)+Math.abs(dy); envia(dx,dy) }
    })
    // solto quase no mesmo lugar = foi CLIQUE, nao arrasto. E assim que o mesmo grip serve
    // pra mover o card E pra abrir o seletor de qualidades, sem um atrapalhar o outro.
    const fim = (e)=>{ if(!on) return; on=false; arrastando=false; try{ el.releasePointerCapture(e.pointerId) }catch(_){}
      if(andou < 5 && aoClicar) aoClicar() }
    el.addEventListener('pointerup', fim)
    el.addEventListener('pointercancel', fim)
  }

  let ligado=false
  function liga (){
    const grip=document.getElementById('grip'), rz=document.getElementById('rz'), zerar=document.getElementById('zerar')
    arrasta(grip, (dx,dy)=>window.ml.cardMove(NUM,dx,dy), ()=>abreDropdown(ultimoSt))
    arrasta(rz,   (dx,dy)=>window.ml.cardSize(NUM,dx,dy))
    // o CABECALHO tambem arrasta (padrao de janela). Garante que sempre exista area de
    // arrasto, mesmo com o card pequeno - foi assim que ele ficou "preso" uma vez.
    // Os botoes ficam de fora: senao clicar na lixeira viraria arrasto.
    const cab=document.querySelector('.h')
    if(cab) arrasta(cab, (dx,dy)=>window.ml.cardMove(NUM,dx,dy), null, e=>!e.target.closest('.acts'))
    if(grip) grip.addEventListener('dblclick', ()=>window.ml.cardHome(NUM))
    if(zerar) zerar.onclick = async ()=>{
      zerar.textContent='…'
      let ok=false; try{ ok=await window.ml.cardReset(NUM) }catch(_){}
      zerar.textContent = ok ? '✓' : '🗑'
      if(ok){ zerar.classList.add('ok'); setTimeout(()=>{ zerar.classList.remove('ok'); zerar.textContent='🗑' }, 1200) }
      tick()
    }
    ligado=true
  }
  setInterval(tick, 1000)   // 1s: redesenha o card inteiro

  // ---- LOOP RAPIDO SO DAS BARRAS DE HP/XP (250ms) ----
  // O `tick` de 1s redesenha o card todo (pesado). Este le SO os campos crus do lider (leitura
  // leve `readHero`) e atualiza APENAS a largura+texto das barras, direto no DOM — sem
  // re-renderizar. Assim o HP acompanha a batalha de perto, quase igual o jogo, sem flicker.
  function heroDe (raw){
    if(!raw) return null
    const hp = (raw.heroHp!=null)?raw.heroHp:raw.rosterHp
    const mx = (raw.heroMaxHp>0)?raw.heroMaxHp:raw.rosterMaxHp
    const lvl = (raw.liderLevel!=null)?raw.liderLevel:raw.rosterLevel
    const xp = raw.liderXp
    // XP%: exato quando conhece limiar[lvl] E limiar[lvl+1]. Enquanto o [lvl+1] nao foi
    // aprendido (so vem quando sobe de novo), ESTIMA o teto pelo span consecutivo mais recente
    // conhecido (a curva cresce suave). Dado observado, nao formula chutada. Vira exato sozinho.
    let xpPct=null; const T=raw.xpThresholds
    if(T && lvl!=null && xp!=null){
      const base=T[lvl]; let teto=T[lvl+1]
      if(base!=null && teto==null){
        let span=null
        for(let L=lvl; L>1 && L>=lvl-10; L--){ if(T[L]!=null && T[L-1]!=null){ span=T[L]-T[L-1]; break } }
        if(span!=null && span>0) teto=base+span
      }
      if(base!=null && teto!=null && teto>base) xpPct=Math.max(0,Math.min(100,(xp-base)/(teto-base)*100))
    }
    return {hp,mx,hpPct:(hp!=null&&mx)?Math.max(0,Math.min(100,hp/mx*100)):null,lvl,xp,xpPct,fainted:!!raw.heroFainted}
  }
  let hpBusy=false
  async function tickHP (){
    if(document.hidden || document.querySelector('.dd') || hpBusy) return
    hpBusy=true
    let raw=null; try{ const r=await window.ml.readHero(); raw=r&&r[NUM] }catch(e){ hpBusy=false; return }
    hpBusy=false
    const h=heroDe(raw); if(!h) return
    // level ao vivo no subtitulo (mesmo ritmo do HP) — nunca 1 atras do jogo
    if(h.lvl!=null){ const lvEl=document.querySelector('.sub .lv'); if(lvEl) lvEl.textContent='nv '+fmt(h.lvl) }
    const bars=document.querySelector('.herobars'); if(!bars) return
    const hpbar=bars.querySelector('.hbar:not(.xp)'), xpbar=bars.querySelector('.hbar.xp')
    if(hpbar && h.hpPct!=null){
      const fill=hpbar.querySelector('.hfill'), lbl=hpbar.querySelector('.hin')
      if(fill){ fill.className='hfill hp '+(h.hpPct<=25?'low':(h.hpPct<=55?'mid':'')); fill.style.width=h.hpPct.toFixed(1)+'%' }
      if(lbl) lbl.textContent=fmt(h.hp)+' / '+fmt(h.mx)+(h.fainted?'  KO':'')
    }
    if(xpbar && h.lvl!=null){
      const fill=xpbar.querySelector('.hfill'), lbl=xpbar.querySelector('.hin')
      const temPct=h.xpPct!=null
      xpbar.className='hbar xp'+(temPct?'':' aprendendo')
      if(fill) fill.style.width=(temPct?h.xpPct.toFixed(1):0)+'%'
      if(lbl) lbl.textContent=temPct?('EXP '+(h.xpPct<10?h.xpPct.toFixed(1):Math.round(h.xpPct))+'%'):('EXP · '+(h.xp!=null?curto(h.xp):'—'))
    }
  }
  setInterval(tickHP, 150)   // o mais rapido que vale: alem disso o limite passa a ser a taxa do `field` do jogo; tick()
</script>
