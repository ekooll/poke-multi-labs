<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Dashboard das contas</title>
<style>
  :root{
    --bg:#0a0605; --surface-2:#1e1210; --surface-3:#261712;
    --line:rgba(216,138,74,.18); --line-strong:rgba(229,179,79,.4);
    --gold:#e5b34f; --gold-soft:#d98350; --cream:#f7eee7;
    --muted:#b5a196; --faint:#7d6d64; --good:#4fc47a; --bad:#e24b35; --warn:#e5b34f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--cream);
    font-family:Inter,system-ui,-apple-system,sans-serif;
    background:radial-gradient(120% 90% at 0% 0%,#1b0f0b 0%,#0a0605 60%)}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:7px 8px 7px 12px;
    background:linear-gradient(90deg,#170807,#2a0f0b 50%,#170807);
    border-bottom:1px solid rgba(226,75,53,.22);-webkit-app-region:drag;cursor:move}
  .bar .t{display:flex;align-items:center;gap:9px}
  .bar .logo{width:22px;height:22px;object-fit:contain;mix-blend-mode:screen;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  .bar .tt{display:flex;flex-direction:column;line-height:1.02;font-family:'Cinzel',Georgia,serif;font-weight:800;font-size:14px;color:var(--gold)}
  .bar .tt small{font-family:Inter,sans-serif;font-weight:600;font-size:8.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.14em;margin-top:1px}
  .wbtns{display:flex;gap:2px;-webkit-app-region:no-drag}
  .bar button{-webkit-app-region:no-drag;background:transparent;border:0;color:var(--faint);
    font-size:13px;cursor:pointer;border-radius:6px;width:26px;height:26px;line-height:1}
  .bar button:hover{color:var(--cream);background:rgba(255,255,255,.08)}
  #pin.on{color:var(--gold);background:rgba(229,179,79,.16)}
  #x:hover{color:#fff;background:var(--bad)}
  .wrap{height:calc(100% - 42px - 44px);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
  .wrap::-webkit-scrollbar{width:7px}.wrap::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px}
  .cards{display:flex;flex-direction:column;gap:10px}

  .totals{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .tile{background:#0d0807;border:1px solid var(--line);border-radius:10px;padding:8px 9px;text-align:center}
  .tile[hidden]{display:none}
  .tile .k{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .tile .v{font-size:16px;font-weight:800;margin-top:2px;color:var(--cream)}
  .tile.gold .v{color:var(--gold)} .tile.good .v{color:var(--good)} .tile.warn .v{color:var(--warn)}

  .chart{background:#0d0807;border:1px solid var(--line);border-radius:11px;padding:10px 11px}
  .chart[hidden]{display:none}
  .chart .ct{font-size:9.5px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin-bottom:8px}
  .crow{display:grid;grid-template-columns:70px 1fr auto;align-items:center;gap:8px;margin-top:5px}
  .crow .cn{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctrack{height:9px;background:#160d0a;border-radius:5px;overflow:hidden}
  .cfill{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-radius:5px;transition:width .5s ease}
  .crow .cv{font-size:11px;font-weight:700;color:var(--good)}

  .card{border:1px solid var(--line);border-radius:11px;background:linear-gradient(160deg,rgba(30,18,16,.9),rgba(13,8,7,.9));
    padding:10px 11px;display:flex;flex-direction:column;gap:7px}
  .card.down{border-color:rgba(226,75,53,.55)}
  .card.warn{border-color:rgba(229,179,79,.45)}
  .chead{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .cname{font-weight:800;font-size:13px;color:var(--cream)}
  .badge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:99px;white-space:nowrap}
  .b-ok{color:#0c1a10;background:var(--good)}
  .b-warn{color:#1a1405;background:var(--warn)}
  .b-down{color:#fff;background:var(--bad)}
  .sub{font-size:11px;color:var(--muted)}
  .sub[hidden]{display:none}
  .hpbar{height:8px;border-radius:5px;background:#0d0807;border:1px solid var(--line);overflow:hidden}
  .hpbar[hidden]{display:none}
  .hpfill{height:100%;background:linear-gradient(90deg,#3ae07c,#1fb959);border-radius:5px 0 0 5px;transition:width .5s ease}
  .pills{display:flex;gap:6px;flex-wrap:wrap}
  .pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--cream);
    background:#0d0807;border:1px solid var(--line);border-radius:8px;padding:4px 8px}
  .pill[hidden]{display:none}
  .pill i{color:var(--faint);font-style:normal;font-weight:600}
  .pill.zero{border-color:rgba(226,75,53,.5);color:#ff9d8d}
  .analyzer{border-top:1px dashed var(--line);padding-top:7px;display:flex;flex-wrap:wrap;gap:5px 8px}
  .analyzer[hidden]{display:none}
  .stat{font-size:10.5px;color:var(--muted)}
  .stat b{color:var(--cream);font-weight:700}
  .stat.loot b{color:var(--good)} .stat.saldo b{color:var(--gold)}
  .na{color:var(--faint);font-style:italic;font-size:12px;text-align:center;padding:18px}

  .ft{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;
    border-top:1px solid var(--line);height:44px}
  .ft button{background:var(--surface-2);border:1px solid var(--line);color:var(--muted);
    border-radius:9px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .ft button:hover{border-color:var(--line-strong);color:var(--gold)}
  .ft label{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:5px;cursor:pointer}
  .ft .stamp{font-size:10px;color:var(--faint)}
</style>
</head>
<body>
  <div class="bar">
    <span class="t"><img src="logo-vp.png" class="logo" alt="VP"><span class="tt">Dashboard<small>das contas</small></span></span>
    <div class="wbtns">
      <button id="pin" title="Fixar no topo">📌</button>
      <button id="min" title="Minimizar">–</button>
      <button id="x" title="Fechar">✕</button>
    </div>
  </div>
  <div class="wrap" id="wrap"><div class="na">carregando…</div></div>
  <div class="ft">
    <button id="rf">↻ Atualizar</button>
    <label><input type="checkbox" id="auto" checked /> auto (4s)</label>
    <label>avisar &lt; <input type="number" id="lowball" value="500" style="width:60px;background:#0b0706;border:1px solid var(--line);border-radius:6px;color:var(--cream);padding:3px 5px;font-family:inherit;font-size:11px"> bolas</label>
    <span class="stamp" id="stamp"></span>
  </div>
<script>
  const $ = (s) => document.querySelector(s)
  const namesMap = () => { try { return JSON.parse(localStorage.getItem('pml_names') || '{}') } catch { return {} } }
  const nameOf = (n) => namesMap()[n] || ('Conta ' + n)
  const fmt = (n) => Number(n || 0).toLocaleString('pt-BR')
  const money = (n) => (n < 0 ? '-$' : '$') + Math.abs(Number(n || 0)).toLocaleString('pt-BR')
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]))
  const BALL_LABELS = { poke: 'Poké', ultra: 'Ultra', idle: 'Idle', great: 'Great', master: 'Master' }
  const BALL_ORDER = ['poke', 'ultra', 'idle', 'great', 'master']
  let busy = false
  let LOW = parseInt(localStorage.getItem('pml_lowball') || '500') || 500

  function alertOf (st) {
    if (!st || st.ok === false) return { cls: 'down', badge: 'b-down', txt: '🔴 Desconectado' }
    if (st.balls && Object.keys(st.balls).length) {
      if (st.ballsTotal === 0) return { cls: 'down', badge: 'b-down', txt: '⚠️ Sem bolas' }
      if (st.ballsTotal < LOW) return { cls: 'warn', badge: 'b-warn', txt: '🟡 Bolas acabando' }
    }
    if (!st.hunt || !st.hunt.seen) return { cls: 'warn', badge: 'b-warn', txt: '⚠️ Fora da hunt' }
    return { cls: '', badge: 'b-ok', txt: '🟢 Na hunt' }
  }

  // income/h por delta do saldo (sem Hunt Analyzer)
  const HIST = {}
  function incomeH (num, mny, ts) {
    if (mny == null) return null
    const h = HIST[num]
    if (!h || mny < h.m0) { HIST[num] = { t0: ts, m0: mny }; return null }
    const dt = (ts - h.t0) / 3600000
    if (dt < 0.005) return null
    return (mny - h.m0) / dt
  }

  // ---------- layout construído UMA vez (evita piscar) ----------
  let layoutKey = null
  const cardEls = {}
  function cardSkeleton () {
    return '<div class="chead"><span class="cname"></span><span class="badge"></span></div>' +
      '<div class="sub c-info"></div>' +
      '<div class="hpbar c-hpbar" hidden><div class="hpfill"></div></div>' +
      '<div class="sub c-hpline" hidden></div>' +
      '<div class="pills c-pills">' +
        BALL_ORDER.map(k => '<span class="pill pb-' + k + '" hidden><i>' + BALL_LABELS[k] + '</i><b></b></span>').join('') +
        '<span class="pill pb-potions" hidden><i>Potions</i><b></b></span>' +
        '<span class="pill pb-revives" hidden><i>Revives</i><b></b></span>' +
        '<span class="pill pb-shiny" hidden style="border-color:rgba(229,179,79,.55);color:var(--gold)"><i>✨ Shiny</i><b></b></span>' +
        '<span class="pill pb-broken" hidden style="border-color:rgba(226,75,53,.5);color:#ff9d8d"><i>💔 Ball quebrada</i><b></b></span>' +
      '</div>' +
      '<div class="analyzer c-live" hidden>' +
        '<span class="stat">⚔️ <b class="l-kills"></b> kills</span>' +
        '<span class="stat loot">🎯 <b class="l-caught"></b> capt.</span>' +
        '<span class="stat">❌ <b class="l-broken"></b> perdidas</span>' +
      '</div>' +
      '<div class="sub c-last" hidden></div>' +
      '<div class="analyzer c-an" hidden></div>'
  }
  function buildLayout (results) {
    const key = results.map(r => r.num).join(',')
    if (key === layoutKey) return
    layoutKey = key
    for (const k in cardEls) delete cardEls[k]
    $('#wrap').innerHTML =
      '<div class="totals">' +
        '<div class="tile"><div class="k">Contas</div><div class="v t-contas"></div></div>' +
        '<div class="tile good"><div class="k">Na hunt</div><div class="v t-hunt"></div></div>' +
        '<div class="tile warn"><div class="k">Alertas</div><div class="v t-alert"></div></div>' +
        '<div class="tile gold t-loot-tile" hidden><div class="k">Loot total</div><div class="v t-loot"></div></div>' +
        '<div class="tile good t-cash-tile" hidden><div class="k">Cash/h</div><div class="v t-cash"></div></div>' +
      '</div>' +
      '<div class="chart t-chart" hidden><div class="ct">Loot por conta</div><div class="t-chart-rows"></div></div>' +
      '<div class="cards"></div>'
    const cardsDiv = $('#wrap .cards')
    results.forEach(r => {
      const el = document.createElement('div')
      el.className = 'card'; el.dataset.num = r.num
      el.innerHTML = cardSkeleton()
      el.querySelector('.cname').textContent = nameOf(r.num)
      cardsDiv.appendChild(el); cardEls[r.num] = el
    })
  }

  const setT = (el, sel, val) => { const n = el.querySelector(sel); if (n && n.textContent !== String(val)) n.textContent = val }
  const show = (el, sel, s) => { const n = el.querySelector(sel); if (n) n.hidden = !s }

  function updateCard (el, row) {
    const st = row.state, a = alertOf(st)
    el.className = 'card ' + a.cls
    const b = el.querySelector('.badge'); b.className = 'badge ' + a.badge; b.textContent = a.txt
    if (!st || st.ok === false) {
      setT(el, '.c-info', row.embedded ? 'jogo não respondeu (caiu?)' : 'não encaixada')
      show(el, '.c-hpbar', false); show(el, '.c-hpline', false); show(el, '.c-live', false); show(el, '.c-an', false)
      el.querySelectorAll('.c-pills .pill').forEach(p => { p.hidden = true }); return
    }
    const parts = []
    if (st.level != null) parts.push('Nível ' + st.level)
    if (st.zone) parts.push('📍 ' + st.zone)
    if (st.active) parts.push('🐾 ' + st.active)
    setT(el, '.c-info', parts.join('  ·  '))
    if (st.hp != null && st.hpMax) {
      show(el, '.c-hpbar', true); show(el, '.c-hpline', true)
      el.querySelector('.hpfill').style.width = Math.max(0, Math.min(100, st.hp / st.hpMax * 100)).toFixed(0) + '%'
      let hl = 'HP ' + fmt(st.hp) + ' / ' + fmt(st.hpMax)
      if (st.hunt && st.hunt.timer) hl += '   ⏱ ' + st.hunt.timer
      if (st.hunt && st.hunt.wild != null) hl += '   ' + st.hunt.wild + ' selvagem'
      setT(el, '.c-hpline', hl)
    } else { show(el, '.c-hpbar', false); show(el, '.c-hpline', false) }
    const balls = st.balls || {}
    BALL_ORDER.forEach(k => {
      const p = el.querySelector('.pb-' + k)
      // leitura do DOM "treme" — se falhar num ciclo, mantem a pill com o ultimo valor (nao pisca)
      if (balls[k] != null) { p.hidden = false; p.classList.toggle('zero', balls[k] === 0); const bn = p.querySelector('b'); const nv = fmt(balls[k]); if (bn.textContent !== nv) bn.textContent = nv }
    })
    const opt = (sel, val) => { const p = el.querySelector(sel); if (val != null) { p.hidden = false; p.querySelector('b').textContent = fmt(val) } else p.hidden = true }
    opt('.pb-potions', st.potions); opt('.pb-revives', st.revives); opt('.pb-shiny', st.shinies); opt('.pb-broken', st.brokenShiny)
    if (st.live && (st.live.kills != null || st.live.caught != null)) {
      show(el, '.c-live', true)
      setT(el, '.l-kills', fmt(st.live.kills)); setT(el, '.l-caught', fmt(st.live.caught)); setT(el, '.l-broken', fmt(st.live.brokenBalls))
    } else show(el, '.c-live', false)
    if (st.live && st.live.lastCatch) {
      const c = st.live.lastCatch
      const q = c.quality != null ? Number(c.quality).toFixed(3) : '?'
      setT(el, '.c-last', '🎁 última: ' + (c.shiny ? '✨ ' : '') + (c.name || '?') + '  ·  Q ' + q + '  ·  IV ' + (c.ivTotal != null ? c.ivTotal : '?'))
      show(el, '.c-last', true)
    } else show(el, '.c-last', false)
    let anHtml = ''
    if (st.an) {
      const A = st.an, p = []
      if (A.loot != null) p.push('<span class="stat loot">💰 Loot <b>' + money(A.loot) + '</b></span>')
      if (A.cashH != null) p.push('<span class="stat">📈 <b>' + money(A.cashH) + '</b>/h</span>')
      if (A.saldo != null) p.push('<span class="stat saldo">Saldo <b>' + money(A.saldo) + '</b></span>')
      anHtml = p.join('')
    } else if (row.measured != null) {
      anHtml = '<span class="stat loot">📈 ~<b>' + money(row.measured) + '</b>/h <span style="color:var(--faint)">(medido)</span></span>'
    }
    const an = el.querySelector('.c-an')
    if (an.dataset.h !== anHtml) { an.dataset.h = anHtml; an.innerHTML = anHtml; an.hidden = !anHtml }
  }

  function updateTotals (results) {
    let inHunt = 0, alerts = 0, loot = 0, cashH = 0, hasLoot = false, hasCash = false
    results.forEach(r => {
      const st = r.state, a = alertOf(st)
      if (a.badge === 'b-ok') inHunt++; else alerts++
      if (st && st.an && st.an.loot != null) { loot += st.an.loot; hasLoot = true }
      const ch = (st && st.an && st.an.cashH != null) ? st.an.cashH : (r.measured != null ? r.measured : null)
      if (ch != null) { cashH += ch; hasCash = true }
    })
    setT(document, '.t-contas', results.length); setT(document, '.t-hunt', inHunt); setT(document, '.t-alert', alerts)
    const lt = $('.t-loot-tile'); if (hasLoot) { lt.hidden = false; setT(document, '.t-loot', money(loot)) } else lt.hidden = true
    const cta = $('.t-cash-tile'); if (hasCash) { cta.hidden = false; setT(document, '.t-cash', money(cashH)) } else cta.hidden = true
    const withLoot = results.filter(r => r.state && r.state.an && r.state.an.loot != null)
    const chart = $('.t-chart')
    if (!withLoot.length) { chart.hidden = true; return }
    const max = Math.max.apply(null, withLoot.map(r => r.state.an.loot).concat([1]))
    const html = withLoot.map(r => { const w = Math.max(3, r.state.an.loot / max * 100); return '<div class="crow"><span class="cn">' + esc(nameOf(r.num)) + '</span><div class="ctrack"><div class="cfill" style="width:' + w.toFixed(0) + '%"></div></div><span class="cv">' + money(r.state.an.loot) + '</span></div>' }).join('')
    const rows = $('.t-chart-rows'); if (rows.dataset.h !== html) { rows.dataset.h = html; rows.innerHTML = html }
    chart.hidden = false
  }

  async function refresh () {
    if (busy) return; busy = true
    try {
      const r = await window.ml.readDashboard()
      if (!r || !r.available) { $('#wrap').innerHTML = '<div class="na">Leitor indisponível nesta versão.</div>'; layoutKey = null; return }
      if (!r.results || !r.results.length) { $('#wrap').innerHTML = '<div class="na">Nenhuma conta aberta.</div>'; layoutKey = null; return }
      const now = Date.now()
      r.results.forEach(row => { row.measured = (row.state && row.state.ok) ? incomeH(row.num, row.state.money, row.state.ts || now) : null })
      buildLayout(r.results)
      updateTotals(r.results)
      r.results.forEach(row => { const el = cardEls[row.num]; if (el) updateCard(el, row) })
      const d = new Date()
      $('#stamp').textContent = 'atualizado ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0')
    } catch (e) { $('#wrap').innerHTML = '<div class="na">Erro: ' + esc(e.message) + '</div>'; layoutKey = null }
    finally { busy = false }
  }
  $('#rf').onclick = refresh
  $('#x').onclick = () => window.close()
  $('#min').onclick = () => window.ml.dashboardMinimize()
  let pinned = false
  $('#pin').onclick = () => { pinned = !pinned; window.ml.dashboardPin(pinned); $('#pin').classList.toggle('on', pinned) }
  const lb = $('#lowball'); lb.value = LOW; lb.addEventListener('input', () => { LOW = parseInt(lb.value) || 0; localStorage.setItem('pml_lowball', LOW); refresh() })
  setInterval(() => { if ($('#auto').checked) refresh() }, 4000)
  refresh()
</script>
</body>
</html>
